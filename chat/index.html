            // 压缩图片
            compressImage(file) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    const reader = new FileReader();
                    
                    reader.onload = (e) => {
                        img.src = e.target.result;
                        
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            
                            if (width > APP_CONFIG.MAX_IMAGE_WIDTH) {
                                height = (APP_CONFIG.MAX_IMAGE_WIDTH / width) * height;
                                width = APP_CONFIG.MAX_IMAGE_WIDTH;
                            }
                            
                            if (height > APP_CONFIG.MAX_IMAGE_HEIGHT) {
                                width = (APP_CONFIG.MAX_IMAGE_HEIGHT / height) * width;
                                height = APP_CONFIG.MAX_IMAGE_HEIGHT;
                            }
                            
                            canvas.width = width;
                            canvas.height = height;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            canvas.toBlob(
                                (blob) => {
                                    if (blob) {
                                        resolve(new File([blob], file.name, {
                                            type: 'image/jpeg',
                                            lastModified: Date.now()
                                        }));
                                    } else {
                                        reject(new Error('压缩失败'));
                                    }
                                },
                                'image/jpeg',
                                APP_CONFIG.IMAGE_QUALITY
                            );
                        };
                        
                        img.onerror = () => {
                            reject(new Error('图片加载失败'));
                        };
                    };
                    
                    reader.onerror = () => {
                        reject(new Error('文件读取失败'));
                    };
                    
                    reader.readAsDataURL(file);
                });
            }
            
            // 开始录音
            async startRecording() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            sampleRate: 44100
                        }
                    });
                    
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.analyser = this.audioContext.createAnalyser();
                    const source = this.audioContext.createMediaStreamSource(stream);
                    source.connect(this.analyser);
                    
                    this.analyser.fftSize = 256;
                    this.analyser.smoothingTimeConstant = 0.8;
                    
                    this.mediaRecorder = new MediaRecorder(stream, {
                        mimeType: APP_CONFIG.AUDIO_FORMAT,
                        audioBitsPerSecond: APP_CONFIG.AUDIO_BITRATE
                    });
                    
                    this.audioChunks = [];
                    
                    this.mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            this.audioChunks.push(event.data);
                        }
                    };
                    
                    this.mediaRecorder.onstop = async () => {
                        stream.getTracks().forEach(track => track.stop());
                        
                        if (this.audioChunks.length > 0) {
                            const audioBlob = new Blob(this.audioChunks, { type: APP_CONFIG.AUDIO_FORMAT });
                            
                            document.getElementById('recordingHint').textContent = '正在上传语音...';
                            
                            const audioUrl = await this.uploadAudio(audioBlob);
                            
                            document.getElementById('recordingOverlay').classList.remove('active');
                            document.getElementById('voiceBtn').classList.remove('recording');
                            
                            if (audioUrl) {
                                await this.sendMessage('', [], audioUrl);
                            }
                        }
                    };
                    
                    this.mediaRecorder.start(100);
                    this.isRecording = true;
                    this.recordingStartTime = Date.now();
                    
                    document.getElementById('recordingBtn').classList.add('recording');
                    document.getElementById('recordingBtn').style.animation = 'pulse-red 1.5s infinite';
                    document.getElementById('recordingStopBtn').style.display = 'block';
                    
                    this.startRecordingTimer();
                    this.startVisualizer();
                    
                } catch (error) {
                    this.showError('无法访问麦克风，请检查权限设置');
                    this.stopRecording();
                }
            }
            
            // 停止录音
            stopRecording() {
                if (!this.isRecording || !this.mediaRecorder) return;
                
                if (this.mediaRecorder.state !== 'inactive') {
                    this.mediaRecorder.stop();
                }
                
                this.stopRecordingTimer();
                this.stopVisualizer();
                
                if (this.audioContext) {
                    this.audioContext.close();
                    this.audioContext = null;
                }
                
                this.isRecording = false;
                this.recordingDuration = Math.min(
                    (Date.now() - this.recordingStartTime) / 1000,
                    APP_CONFIG.MAX_AUDIO_DURATION
                );
            }
            
            // 开始录音计时器
            startRecordingTimer() {
                const timerElement = document.getElementById('recordingTimer');
                this.recordingTimer = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - this.recordingStartTime) / 1000);
                    const remaining = APP_CONFIG.MAX_AUDIO_DURATION - elapsed;
                    
                    if (remaining <= 0) {
                        this.stopRecording();
                        return;
                    }
                    
                    const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
                    const seconds = (elapsed % 60).toString().padStart(2, '0');
                    timerElement.textContent = `${minutes}:${seconds}`;
                    
                    document.getElementById('recordingHint').textContent = 
                        `剩余 ${remaining} 秒，松开发送`;
                        
                }, 100);
            }
            
            // 停止录音计时器
            stopRecordingTimer() {
                if (this.recordingTimer) {
                    clearInterval(this.recordingTimer);
                    this.recordingTimer = null;
                }
            }
            
            // 开始音频可视化
            startVisualizer() {
                const canvas = document.getElementById('recordingCanvas');
                const ctx = canvas.getContext('2d');
                this.recordingCanvas = canvas;
                this.recordingCtx = ctx;
                
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                
                const bufferLength = this.analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                
                const draw = () => {
                    if (!this.isRecording || !this.analyser) return;
                    
                    requestAnimationFrame(draw);
                    
                    this.analyser.getByteFrequencyData(dataArray);
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    const barWidth = (canvas.width / bufferLength) * 2.5;
                    let barHeight;
                    let x = 0;
                    
                    for (let i = 0; i < bufferLength; i++) {
                        barHeight = (dataArray[i] / 255) * canvas.height;
                        
                        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                        gradient.addColorStop(0, '#ff4444');
                        gradient.addColorStop(1, '#ff8888');
                        
                        ctx.fillStyle = gradient;
                        
                        ctx.fillRect(
                            x,
                            canvas.height - barHeight,
                            barWidth,
                            barHeight
                        );
                        
                        x += barWidth + 1;
                    }
                };
                
                this.visualizerInterval = setInterval(draw, 1000 / 30);
            }
            
            // 停止音频可视化
            stopVisualizer() {
                if (this.visualizerInterval) {
                    clearInterval(this.visualizerInterval);
                    this.visualizerInterval = null;
                }
                
                if (this.recordingCtx && this.recordingCanvas) {
                    this.recordingCtx.clearRect(0, 0, this.recordingCanvas.width, this.recordingCanvas.height);
                }
            }
            
            // 加载图片
            loadImage(imageUrl, placeholder, imageElement) {
                if (this.loadedImages.has(imageUrl)) {
                    this.showImage(imageUrl, placeholder, imageElement);
                    return;
                }
                
                placeholder.querySelector('.placeholder-text').textContent = '加载中...';
                
                const img = new Image();
                img.onload = () => {
                    this.loadedImages.add(imageUrl);
                    this.displayedImages.add(imageUrl);
                    this.showImage(imageUrl, placeholder, imageElement);
                };
                img.onerror = () => {
                    placeholder.querySelector('.placeholder-text').textContent = '加载失败，点击重试';
                    placeholder.style.cursor = 'pointer';
                    placeholder.onclick = () => {
                        this.loadImage(imageUrl, placeholder, imageElement);
                    };
                };
                img.src = this.getProxyUrl(imageUrl);
            }
            
            // 显示图片
            showImage(imageUrl, placeholder, imageElement) {
                placeholder.style.display = 'none';
                imageElement.src = this.getProxyUrl(imageUrl);
                imageElement.classList.add('loaded');
                
                this.displayedImageElements.set(imageUrl, imageElement.cloneNode(true));
                
                if (this.lazyLoadObserver) {
                    this.lazyLoadObserver.observe(imageElement);
                }
            }
            
            // 播放音频
            playAudio(audioUrl, playBtn, progressBar, timeDisplay) {
                if (this.currentAudio && this.currentAudio !== audioUrl) {
                    const currentPlayBtn = document.querySelector('.audio-play-btn.playing');
                    if (currentPlayBtn) {
                        currentPlayBtn.classList.remove('playing');
                        currentPlayBtn.textContent = '▶';
                    }
                }
                
                if (this.currentAudio === audioUrl && this.currentAudioElement) {
                    this.currentAudioElement.pause();
                    this.currentAudioElement.currentTime = 0;
                    this.currentAudio = null;
                    this.currentAudioElement = null;
                    playBtn.classList.remove('playing');
                    playBtn.textContent = '▶';
                    progressBar.style.width = '0%';
                    timeDisplay.textContent = '00:00';
                    return;
                }
                
                let audio = this.audioCache.get(audioUrl);
                
                if (!audio) {
                    audio = new Audio(this.getProxyUrl(audioUrl));
                    this.audioCache.set(audioUrl, audio);
                    
                    playBtn.textContent = '⏳';
                    playBtn.disabled = true;
                    
                    audio.oncanplaythrough = () => {
                        playBtn.textContent = '▶';
                        playBtn.disabled = false;
                        this.loadedAudios.add(audioUrl);
                    };
                    
                    audio.onerror = () => {
                        playBtn.textContent = '▶';
                        playBtn.disabled = false;
                        this.showError('音频加载失败');
                    };
                } else if (audio.readyState < 3) {
                    playBtn.textContent = '⏳';
                    playBtn.disabled = true;
                    
                    audio.oncanplaythrough = () => {
                        playBtn.textContent = '▶';
                        playBtn.disabled = false;
                        playBtn.click();
                    };
                }
                
                this.currentAudio = audioUrl;
                this.currentAudioElement = audio;
                
                playBtn.classList.add('playing');
                playBtn.textContent = '⏸';
                
                audio.play();
                
                audio.ontimeupdate = () => {
                    const progress = (audio.currentTime / audio.duration) * 100;
                    progressBar.style.width = `${progress}%`;
                    
                    const currentTime = Math.floor(audio.currentTime);
                    const minutes = Math.floor(currentTime / 60).toString().padStart(2, '0');
                    const seconds = (currentTime % 60).toString().padStart(2, '0');
                    timeDisplay.textContent = `${minutes}:${seconds}`;
                };
                
                audio.onended = () => {
                    playBtn.classList.remove('playing');
                    playBtn.textContent = '▶';
                    progressBar.style.width = '0%';
                    timeDisplay.textContent = '00:00';
                    this.currentAudio = null;
                    this.currentAudioElement = null;
                };
                
                audio.onerror = () => {
                    playBtn.classList.remove('playing');
                    playBtn.textContent = '▶';
                    this.showError('音频播放失败');
                    this.currentAudio = null;
                    this.currentAudioElement = null;
                };
            }
            
            // 复制文本到剪贴板
            copyTextToClipboard(text) {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(() => {
                        this.showTemporaryMessage('已复制到剪贴板');
                    }).catch(err => {
                        this.copyTextFallback(text);
                    });
                } else {
                    this.copyTextFallback(text);
                }
            }
            
            // 备用复制方法
            copyTextFallback(text) {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.style.position = 'fixed';
                textArea.style.left = '-999999px';
                textArea.style.top = '-999999px';
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                
                try {
                    document.execCommand('copy');
                    this.showTemporaryMessage('已复制到剪贴板');
                } catch (err) {
                    this.showError('复制失败，请手动复制');
                }
                
                document.body.removeChild(textArea);
            }
            
            // 显示临时消息
            showTemporaryMessage(message) {
                const tempMsg = document.createElement('div');
                tempMsg.textContent = message;
                tempMsg.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: rgba(0, 0, 0, 0.8);
                    color: white;
                    padding: 10px 20px;
                    border-radius: 5px;
                    z-index: 10000;
                    font-size: 14px;
                `;
                document.body.appendChild(tempMsg);
                
                setTimeout(() => {
                    document.body.removeChild(tempMsg);
                }, 1500);
            }
            
            // 文件转Base64
            fileToBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }
            
            // Blob转Base64
            blobToBase64(blob) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            }
            
            // 添加系统消息
            addSystemMessage(text) {
                const message = {
                    id: 'system_' + Date.now(),
                    type: 'system',
                    text: text,
                    timestamp: Date.now(),
                    time: this.formatTime(new Date())
                };
                
                const chatContainer = document.getElementById('chatContainer');
                const systemMsg = document.createElement('div');
                systemMsg.className = 'system-message';
                systemMsg.textContent = text;
                chatContainer.appendChild(systemMsg);
                this.scrollToBottom();
            }
            
            // 渲染消息
            renderMessages() {
                const chatContainer = document.getElementById('chatContainer');
                
                const loadingElements = chatContainer.querySelectorAll('.loading, .system-message:first-child');
                loadingElements.forEach(el => {
                    if (el.textContent.includes('正在连接') || el.textContent.includes('暂无消息')) {
                        el.remove();
                    }
                });
                
                // 保存当前选中的文本（如果有）
                this.saveTextSelection();
                
                chatContainer.innerHTML = '';
                
                if (this.messages.length === 0) {
                    const emptyMsg = document.createElement('div');
                    emptyMsg.className = 'system-message';
                    emptyMsg.textContent = '还没有消息，快来说点什么吧~';
                    chatContainer.appendChild(emptyMsg);
                    return;
                }
                
                this.messages.forEach(msg => {
                    if (msg.type === 'system') {
                        const systemMsg = document.createElement('div');
                        systemMsg.className = 'system-message';
                        systemMsg.textContent = msg.text;
                        chatContainer.appendChild(systemMsg);
                    } else {
                        const isOwn = msg.userId === this.userId;
                        const messageElement = document.createElement('div');
                        messageElement.className = `message ${isOwn ? 'own' : ''}`;
                        
                        let contentHTML = '';
                        
                        // 文本内容
                        if (msg.text) {
                            const messageId = `msg_${msg.id}`;
                            contentHTML += `
                                <div class="message-text" id="${messageId}">${this.escapeHtml(msg.text)}</div>
                                <button class="copy-btn" data-message-id="${messageId}">复制</button>
                            `;
                        }
                        
                        // 图片内容
                        if (msg.images && msg.images.length > 0) {
                            msg.images.forEach((imgUrl, index) => {
                                const imageId = `image_${msg.id}_${index}`;
                                
                                if (this.displayedImages.has(imgUrl) && this.displayedImageElements.has(imgUrl)) {
                                    contentHTML += `
                                        <div class="message-image-container">
                                            <img src="${this.getProxyUrl(imgUrl)}" 
                                                 alt="图片" 
                                                 class="message-image loaded"
                                                 data-src="${imgUrl}">
                                        </div>
                                    `;
                                } else {
                                    contentHTML += `
                                        <div class="message-image-container">
                                            <div class="message-image-placeholder" 
                                                 id="placeholder_${imageId}"
                                                 data-image-url="${imgUrl}">
                                                <div class="placeholder-icon">🖼️</div>
                                                <div class="placeholder-text">点击查看图片</div>
                                            </div>
                                            <img class="message-image lazy-image" 
                                                 id="${imageId}"
                                                 data-src="${imgUrl}"
                                                 alt="图片"
                                                 style="display: none;">
                                        </div>
                                    `;
                                }
                            });
                        }
                        
                        // 语音内容
                        if (msg.audio) {
                            const audioId = `audio_${msg.id}`;
                            const playBtnId = `play_${msg.id}`;
                            const progressBarId = `progress_${msg.id}`;
                            const timeDisplayId = `time_${msg.id}`;
                            
                            contentHTML += `
                                <div class="message-audio">
                                    <div class="audio-player">
                                        <button class="audio-play-btn" id="${playBtnId}" data-audio-url="${msg.audio}">
                                            ▶
                                        </button>
                                        <div class="audio-progress-container">
                                            <div class="audio-progress-bar" id="${progressBarId}"></div>
                                        </div>
                                        <div class="audio-time" id="${timeDisplayId}">00:00</div>
                                    </div>
                                </div>
                            `;
                        }
                        
                        messageElement.innerHTML = `
                            <div class="message-header">
                                <div class="username">${this.escapeHtml(msg.username)}</div>
                                <div class="message-time">${msg.time || this.formatTime(new Date(msg.timestamp))}</div>
                            </div>
                            ${contentHTML}
                        `;
                        
                        chatContainer.appendChild(messageElement);
                        
                        // 为复制按钮添加事件
                        if (msg.text) {
                            const copyBtn = messageElement.querySelector('.copy-btn');
                            const messageText = msg.text;
                            copyBtn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                this.copyTextToClipboard(messageText);
                            });
                        }
                        
                        // 为图片占位符添加事件
                        if (msg.images && msg.images.length > 0) {
                            msg.images.forEach((imgUrl, index) => {
                                const imageId = `image_${msg.id}_${index}`;
                                const placeholder = document.getElementById(`placeholder_${imageId}`);
                                const imageElement = document.getElementById(imageId);
                                
                                if (placeholder && imageElement) {
                                    placeholder.addEventListener('click', () => {
                                        this.loadImage(imgUrl, placeholder, imageElement);
                                    });
                                    
                                    if (this.lazyLoadObserver) {
                                        this.lazyLoadObserver.observe(imageElement);
                                    }
                                }
                            });
                        }
                        
                        // 为音频消息添加事件
                        if (msg.audio) {
                            const playBtn = document.getElementById(`play_${msg.id}`);
                            const progressBar = document.getElementById(`progress_${msg.id}`);
                            const timeDisplay = document.getElementById(`time_${msg.id}`);
                            
                            if (playBtn) {
                                playBtn.addEventListener('click', () => {
                                    this.playAudio(msg.audio, playBtn, progressBar, timeDisplay);
                                });
                                
                                this.preloadAudio(msg.audio);
                            }
                        }
                    }
                });
                
                // 恢复文本选择（如果之前有）
                this.restoreTextSelection();
                
                // 恢复滚动位置或滚动到底部
                if (this.shouldPreserveScroll && !this.isAtBottom) {
                    setTimeout(() => {
                        this.restoreScrollPosition();
                    }, 50);
                } else if (this.autoScrollEnabled && this.isAtBottom) {
                    setTimeout(() => {
                        this.scrollToBottom(true);
                    }, 100);
                }
            }
            
            // 保存文本选择
            saveTextSelection() {
                const selection = window.getSelection();
                if (selection && selection.rangeCount > 0 && !selection.isCollapsed) {
                    const range = selection.getRangeAt(0);
                    const chatContainer = document.getElementById('chatContainer');
                    
                    // 检查选择是否在聊天容器内
                    if (chatContainer.contains(range.commonAncestorContainer) || 
                        range.commonAncestorContainer === chatContainer) {
                        
                        this.isUserSelecting = true;
                        this.selectionStartTime = Date.now();
                        this.lastSelectionRange = range;
                    }
                }
            }
            
            // 恢复文本选择
            restoreTextSelection() {
                if (this.isUserSelecting && this.lastSelectionRange) {
                    try {
                        const selection = window.getSelection();
                        selection.removeAllRanges();
                        selection.addRange(this.lastSelectionRange);
                        
                        // 重置选择状态
                        setTimeout(() => {
                            this.isUserSelecting = false;
                            this.lastSelectionRange = null;
                        }, 100);
                    } catch (e) {
                        // 选择恢复失败，忽略
                        this.isUserSelecting = false;
                        this.lastSelectionRange = null;
                    }
                }
            }
            
            // 开始自动刷新
            startAutoRefresh() {
                const initialDelay = Math.random() * 3000;
                
                setTimeout(() => {
                    setInterval(() => {
                        // 如果用户正在选择文本，延迟刷新
                        if (this.isUserSelecting) {
                            const selectionDuration = Date.now() - this.selectionStartTime;
                            if (selectionDuration < 2000) { // 选择开始后2秒内不刷新
                                return;
                            }
                        }
                        this.loadMessages();
                    }, APP_CONFIG.REFRESH_INTERVAL);
                }, initialDelay);
            }
            
            // 更新连接状态
            updateStatus(status, type = 'online') {
                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                
                statusText.textContent = status;
                
                if (type === 'online') {
                    statusDot.className = 'status-dot';
                } else if (type === 'error') {
                    statusDot.className = 'status-dot error';
                } else {
                    statusDot.className = 'status-dot offline';
                }
            }
            
            // 启用输入框
            enableInput() {
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('imageBtn').disabled = false;
                document.getElementById('voiceBtn').disabled = false;
                document.getElementById('messageInput').disabled = false;
                document.getElementById('messageInput').placeholder = '输入消息...';
            }
            
            // 禁用输入框
            disableInput() {
                document.getElementById('sendBtn').disabled = true;
                document.getElementById('imageBtn').disabled = true;
                document.getElementById('voiceBtn').disabled = true;
                document.getElementById('messageInput').disabled = true;
                document.getElementById('messageInput').placeholder = '连接已断开...';
            }
            
            // 显示错误
            showError(message) {
                const errorElement = document.getElementById('errorMessage');
                errorElement.textContent = message;
                errorElement.classList.add('show');
                
                setTimeout(() => {
                    errorElement.classList.remove('show');
                }, 3000);
            }
            
            // 隐藏错误
            hideError() {
                const errorElement = document.getElementById('errorMessage');
                errorElement.classList.remove('show');
            }
            
            // Base64编码
            encodeBase64(str) {
                try {
                    return btoa(unescape(encodeURIComponent(str)));
                } catch (error) {
                    return btoa(str);
                }
            }
            
            // Base64解码
            decodeBase64(str) {
                try {
                    return decodeURIComponent(escape(atob(str)));
                } catch (error) {
                    return atob(str);
                }
            }
            
            // 设置事件监听器
            setupEventListeners() {
                const sendBtn = document.getElementById('sendBtn');
                const messageInput = document.getElementById('messageInput');
                const userInfo = document.getElementById('userInfo');
                const imageBtn = document.getElementById('imageBtn');
                const voiceBtn = document.getElementById('voiceBtn');
                const fileInput = document.getElementById('fileInput');
                const previewContainer = document.getElementById('previewContainer');
                const compressNotice = document.getElementById('compressNotice');
                const recordingBtn = document.getElementById('recordingBtn');
                const recordingStopBtn = document.getElementById('recordingStopBtn');
                const recordingOverlay = document.getElementById('recordingOverlay');
                const newMessageIndicator = document.getElementById('newMessageIndicator');
                
                let selectedImages = [];
                
                // 新消息提示点击事件
                newMessageIndicator.addEventListener('click', () => {
                    this.scrollToBottom(true);
                });
                
                // 发送按钮点击事件
                sendBtn.addEventListener('click', async () => {
                    const text = messageInput.value.trim();
                    
                    if (text || selectedImages.length > 0) {
                        const success = await this.sendMessage(text, selectedImages);
                        if (success) {
                            messageInput.value = '';
                            selectedImages = [];
                            previewContainer.innerHTML = '';
                            previewContainer.classList.remove('active');
                            compressNotice.classList.remove('active');
                        }
                        messageInput.focus();
                    }
                });
                
                // 输入框回车事件
                messageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendBtn.click();
                    }
                });
                
                // 图片按钮点击事件
                imageBtn.addEventListener('click', () => {
                    fileInput.click();
                });
                
                // 语音按钮点击事件
                voiceBtn.addEventListener('click', () => {
                    recordingOverlay.classList.add('active');
                    voiceBtn.classList.add('recording');
                });
                
                // 开始录音按钮
                recordingBtn.addEventListener('mousedown', () => {
                    this.startRecording();
                });
                
                recordingBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.startRecording();
                });
                
                // 停止录音按钮
                recordingStopBtn.addEventListener('click', () => {
                    this.stopRecording();
                });
                
                // 录音界面点击外部关闭
                recordingOverlay.addEventListener('click', (e) => {
                    if (e.target === recordingOverlay) {
                        this.stopRecording();
                        recordingOverlay.classList.remove('active');
                        voiceBtn.classList.remove('recording');
                    }
                });
                
                // 文件选择事件
                fileInput.addEventListener('change', (e) => {
                    const files = Array.from(e.target.files);
                    
                    if (files.length === 0) return;
                    
                    if (files.length > 5) {
                        this.showError('最多只能选择5张图片');
                        return;
                    }
                    
                    let hasLargeFile = false;
                    files.forEach(file => {
                        if (file.size > APP_CONFIG.MAX_IMAGE_SIZE) {
                            this.showError(`${file.name} 超过${APP_CONFIG.MAX_IMAGE_SIZE / 1024 / 1024}MB限制`);
                            hasLargeFile = true;
                        }
                    });
                    
                    if (hasLargeFile) return;
                    
                    selectedImages = [];
                    previewContainer.innerHTML = '';
                    
                    files.forEach((file, index) => {
                        selectedImages.push(file);
                        
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const previewDiv = document.createElement('div');
                            previewDiv.className = 'image-preview';
                            previewDiv.innerHTML = `
                                <img src="${e.target.result}" alt="预览">
                                <button class="remove-preview" data-index="${index}">×</button>
                            `;
                            previewContainer.appendChild(previewDiv);
                            
                            previewDiv.querySelector('.remove-preview').addEventListener('click', (e) => {
                                e.stopPropagation();
                                const idx = parseInt(e.target.dataset.index);
                                selectedImages.splice(idx, 1);
                                previewDiv.remove();
                                
                                const removeBtns = previewContainer.querySelectorAll('.remove-preview');
                                removeBtns.forEach((btn, i) => {
                                    btn.dataset.index = i;
                                });
                                
                                if (selectedImages.length === 0) {
                                    previewContainer.classList.remove('active');
                                    compressNotice.classList.remove('active');
                                }
                            });
                            
                            previewContainer.classList.add('active');
                            
                            if (file.size > APP_CONFIG.COMPRESS_THRESHOLD) {
                                compressNotice.textContent = '检测到大图，将自动压缩...';
                                compressNotice.classList.add('active');
                            }
                        };
                        reader.readAsDataURL(file);
                    });
                    
                    fileInput.value = '';
                });
                
                // 双击用户名可以更改
                userInfo.addEventListener('dblclick', () => {
                    const newName = prompt('请输入新的用户名（不超过10个字符）:', this.username);
                    if (newName && newName.trim() && newName.trim().length <= 10) {
                        const oldName = this.username;
                        this.username = newName.trim();
                        localStorage.setItem('chat_username', this.username);
                        this.displayUsername();
                        this.addSystemMessage(`${oldName} 更名为 ${this.username}`);
                    }
                });
                
                // 页面可见性变化时刷新
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) {
                        this.loadMessages();
                    }
                });
                
                // 网络状态变化
                window.addEventListener('online', () => {
                    this.updateStatus('重新连接中...');
                    this.loadMessages();
                });
                
                window.addEventListener('offline', () => {
                    this.updateStatus('离线', 'error');
                    this.showError('网络连接已断开');
                });
            }
            
            // 格式化时间
            formatTime(date) {
                return date.toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });
            }
            
            // HTML转义
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            // 调试日志
            logDebug(...args) {
                if (this.debugMode) {
                    console.log('[DEBUG]', ...args);
                }
            }
            
            // 错误日志
            logError(...args) {
                console.error('[ERROR]', ...args);
            }
        }
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            try {
                window.chatApp = new GiteeChat();
            } catch (error) {
                document.getElementById('errorMessage').textContent = '聊天室启动失败: ' + error.message;
                document.getElementById('errorMessage').classList.add('show');
                document.getElementById('statusDot').className = 'status-dot error';
                document.getElementById('statusText').textContent = '启动失败';
            }
        });
    </script>
</body>
</html>
