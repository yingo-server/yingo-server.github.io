<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨谭</title>
    <style>
        /* 全局样式 - 极简黑底白线 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid #333333;
            background: #000000;
            height: 97vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 头部样式 */
        .header {
            padding: 15px;
            border-bottom: 1px solid #333333;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #ffffff;
        }
        
        .header .subtitle {
            font-size: 12px;
            color: #888888;
            margin-top: 4px;
        }
        
        .user-info {
            position: absolute;
            right: 15px;
            top: 15px;
            color: #ffffff;
            font-size: 12px;
            cursor: pointer;
        }
        
        .user-info:hover {
            color: #0099ff;
        }
        
        /* 消息区域样式 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: #000000;
        }
        
        .message {
            margin-bottom: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #222222;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .username {
            font-weight: 500;
            color: #ffffff;
            font-size: 13px;
        }
        
        .message-time {
            color: #666666;
            font-size: 11px;
        }
        
        .message-text {
            color: #cccccc;
            line-height: 1.4;
            font-size: 14px;
            word-break: break-word;
            margin-bottom: 5px;
            user-select: text; /* 允许文本选择 */
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
        }
        
        .message.own {
            border-left: 2px solid #ffffff;
            padding-left: 10px;
        }
        
        /* 图片消息样式 - 懒加载 */
        .message-image-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
            margin-top: 5px;
        }
        
        .message-image-placeholder {
            width: 200px;
            height: 150px;
            background: #111111;
            border: 1px solid #333333;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .message-image-placeholder:hover {
            background: #1a1a1a;
            border-color: #555555;
        }
        
        .placeholder-icon {
            font-size: 24px;
            margin-bottom: 8px;
            color: #666666;
        }
        
        .placeholder-text {
            font-size: 12px;
            color: #888888;
        }
        
        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 4px;
            border: 1px solid #333333;
            cursor: pointer;
            transition: opacity 0.2s;
            display: none; /* 初始隐藏，点击后显示 */
        }
        
        .message-image.loaded {
            display: block;
        }
        
        .message-image:hover {
            opacity: 0.9;
        }
        
        /* 音频消息样式 */
        .message-audio {
            margin-top: 5px;
            width: 250px;
        }
        
        .audio-player {
            background: #111111;
            border: 1px solid #333333;
            border-radius: 20px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .audio-play-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        
        .audio-play-btn:hover {
            background: #222222;
        }
        
        .audio-play-btn.playing {
            color: #0099ff;
        }
        
        .audio-progress-container {
            flex: 1;
            height: 4px;
            background: #333333;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }
        
        .audio-progress-bar {
            height: 100%;
            background: #0099ff;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s;
        }
        
        .audio-time {
            font-size: 11px;
            color: #888888;
            min-width: 40px;
        }
        
        .audio-duration {
            font-size: 10px;
            color: #666666;
        }
        
        /* 录音界面样式 */
        .recording-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .recording-overlay.active {
            display: flex;
        }
        
        .recording-container {
            background: #000000;
            border: 1px solid #333333;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            max-width: 300px;
            width: 90%;
        }
        
        .recording-timer {
            font-size: 32px;
            color: #ffffff;
            margin: 20px 0;
            font-family: monospace;
        }
        
        .recording-visualizer {
            width: 100%;
            height: 80px;
            margin: 20px 0;
            position: relative;
        }
        
        .recording-visualizer canvas {
            width: 100%;
            height: 100%;
        }
        
        .recording-btn {
            background: #ff4444;
            color: #ffffff;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: transform 0.2s;
        }
        
        .recording-btn:hover {
            transform: scale(1.05);
        }
        
        .recording-btn.recording {
            animation: pulse 1.5s infinite;
        }
        
        .recording-stop-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 4px;
            padding: 8px 20px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .recording-hint {
            font-size: 12px;
            color: #888888;
            margin-top: 10px;
        }
        
        /* 输入区域样式 - 双排布局 */
        .input-area {
            padding: 10px;
            border-top: 1px solid #333333;
            background: #000000;
        }
        
        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .input-row:last-child {
            margin-bottom: 0;
        }
        
        .message-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #333333;
            border-radius: 0;
            background: #000000;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }
        
        .message-input:focus {
            border-color: #666666;
        }
        
        .send-btn {
            background: #000000;
            color: #ffffff;
            border: 1px solid #333333;
            padding: 0 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 80px;
            height: 42px;
        }
        
        .send-btn:hover {
            background: #111111;
            border-color: #666666;
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .action-btn {
            background: #000000;
            color: #ffffff;
            border: 1px solid #333333;
            padding: 0 15px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 60px;
        }
        
        .action-btn:hover {
            background: #111111;
            border-color: #666666;
        }
        
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .action-btn.recording {
            background: #ff4444;
            border-color: #ff4444;
            color: #ffffff;
        }
        
        .file-input {
            display: none;
        }
        
        .preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 8px;
            padding: 10px;
            border: 1px solid #333333;
            display: none;
        }
        
        .preview-container.active {
            display: flex;
        }
        
        .image-preview {
            position: relative;
            width: 60px;
            height: 60px;
            border: 1px solid #333333;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .remove-preview {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 图片查看模态框 */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }
        
        .image-modal.active {
            display: flex;
        }
        
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        
        .image-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ffffff;
            font-size: 30px;
            cursor: pointer;
            z-index: 1001;
        }
        
        /* 状态指示器 */
        .status-indicator {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: #000000;
            color: #ffffff;
            padding: 5px 10px;
            border: 1px solid #333333;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff00;
        }
        
        .status-dot.offline {
            background: #ff0000;
        }
        
        .status-dot.error {
            background: #ff9900;
            animation: pulse 1s infinite;
        }
        
        /* 错误提示 */
        .error-message {
            text-align: center;
            color: #ff4444;
            padding: 10px;
            font-size: 12px;
            border: 1px solid #ff4444;
            margin: 10px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        /* 滚动条样式 */
        .chat-container::-webkit-scrollbar {
            width: 5px;
        }
        
        .chat-container::-webkit-scrollbar-track {
            background: #000000;
        }
        
        .chat-container::-webkit-scrollbar-thumb {
            background: #333333;
        }
        
        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #555555;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 20px;
            color: #666666;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #333333;
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                height: 100vh;
                border: none;
            }
            
            .header {
                padding: 12px;
            }
            
            .user-info {
                position: relative;
                top: 0;
                right: 0;
                margin-top: 8px;
                display: inline-block;
            }
            
            .input-row {
                flex-wrap: wrap;
            }
            
            .action-btn {
                min-width: 50px;
                padding: 0 10px;
            }
            
            .message-image-placeholder {
                width: 150px;
                height: 120px;
            }
            
            .message-audio {
                width: 100%;
                max-width: 250px;
            }
            
            .recording-container {
                padding: 20px;
            }
        }
        
        /* 压缩提示 */
        .compress-notice {
            font-size: 11px;
            color: #888888;
            padding: 5px;
            text-align: center;
            border: 1px solid #333333;
            margin-bottom: 8px;
            display: none;
        }
        
        .compress-notice.active {
            display: block;
        }
        
        /* 音频加载提示 */
        .audio-loading {
            font-size: 10px;
            color: #888888;
            margin-left: 5px;
        }
        
        /* 新消息提示 */
        .new-message-indicator {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: #0099ff;
            color: #ffffff;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .new-message-indicator.show {
            opacity: 1;
        }
        
        /* 复制按钮 */
        .copy-btn {
            position: absolute;
            right: 5px;
            top: 5px;
            background: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            border: 1px solid #333333;
            border-radius: 3px;
            padding: 3px 8px;
            font-size: 10px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }
        
        .message:hover .copy-btn {
            opacity: 1;
        }
        
        .copy-btn:hover {
            background: rgba(51, 51, 51, 0.7);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>墨谭</h1>
            <div class="subtitle">极简 · 私密</div>
            <div class="user-info" id="userInfo">
                <span id="username">加载中...</span>
            </div>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="chat-container" id="chatContainer">
            <div class="loading">正在连接...</div>
        </div>
        
        <!-- 新消息提示 -->
        <div class="new-message-indicator" id="newMessageIndicator">
            <span>有新的消息</span>
            <span>↓</span>
        </div>
        
        <!-- 图片预览区 -->
        <div class="preview-container" id="previewContainer"></div>
        
        <!-- 压缩提示 -->
        <div class="compress-notice" id="compressNotice"></div>
        
        <div class="input-area">
            <!-- 第一排：文字输入和发送按钮 -->
            <div class="input-row">
                <input type="text" 
                       class="message-input" 
                       id="messageInput" 
                       placeholder="输入消息..."
                       maxlength="500"
                       autocomplete="off">
                <button class="send-btn" id="sendBtn" disabled>发送</button>
            </div>
            
            <!-- 第二排：图片、语音按钮 -->
            <div class="input-row">
                <button class="action-btn" id="imageBtn" title="发送图片">
                    📷
                </button>
                <input type="file" 
                       class="file-input" 
                       id="fileInput" 
                       accept="image/*" 
                       multiple>
                
                <button class="action-btn" id="voiceBtn" title="发送语音">
                    🎤
                </button>
            </div>
        </div>
    </div>
    
    <!-- 图片查看模态框 -->
    <div class="image-modal" id="imageModal">
        <div class="image-close" id="imageClose">×</div>
        <img id="modalImage" src="" alt="预览">
    </div>
    
    <!-- 录音界面 -->
    <div class="recording-overlay" id="recordingOverlay">
        <div class="recording-container">
            <div>按住录音，最长15秒</div>
            <div class="recording-timer" id="recordingTimer">00:00</div>
            <div class="recording-visualizer">
                <canvas id="recordingCanvas"></canvas>
            </div>
            <button class="recording-btn" id="recordingBtn">
                🎤
            </button>
            <button class="recording-stop-btn" id="recordingStopBtn" style="display: none;">
                停止并发送
            </button>
            <div class="recording-hint" id="recordingHint">
                松开手指发送，上滑取消
            </div>
        </div>
    </div>
    
    <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">连接中</span>
    </div>
    
    <script>
        // ==================== Gitee配置 ====================
        const GITEE_CONFIG = {
            ACCESS_TOKEN: '36079a70cc1fbac56f6846d99653405a',
            OWNER: 'yingo-server',
            REPO: 'yingo',
            FILE_PATH: 'message.json',
            IMAGE_DIR: 'chat_images',
            AUDIO_DIR: 'rec',
            API_BASE: 'https://gitee.com/api/v5',
            MAX_RETRIES: 3,
            // 使用https://api.codetabs.com/v1/proxy?quest=作为CORS代理
            CORS_PROXY: 'https://api.codetabs.com/v1/proxy?quest='
        };

        // 应用配置
        const APP_CONFIG = {
            REFRESH_INTERVAL: 3000,
            MAX_MESSAGES: 300,
            SHOW_TIMESTAMP: true,
            // 图片配置
            MAX_IMAGE_SIZE: 5 * 1024 * 1024, // 5MB
            COMPRESS_THRESHOLD: 1 * 1024 * 1024, // 1MB 以上压缩
            MAX_IMAGE_WIDTH: 1920,
            MAX_IMAGE_HEIGHT: 1080,
            IMAGE_QUALITY: 0.7,
            // 语音配置
            MAX_AUDIO_DURATION: 15, // 最大15秒
            AUDIO_FORMAT: 'audio/webm',
            AUDIO_BITRATE: 128000,
            // 懒加载配置
            LAZY_LOAD_THRESHOLD: 100,
            // 滚动行为配置
            AUTO_SCROLL_THRESHOLD: 100, // 距离底部100px内算作底部
            KEEP_SCROLL_POSITION: true // 刷新时保持滚动位置
        };

        // 用户配置
        const USER_CONFIG = {
            USERNAME_LIST: [
                '访客一', '访客二', '访客三', '访客四', '访客五'
            ],
            DEFAULT_USERNAME: '匿名用户'
        };

        // ==================== 核心功能 ====================
        class GiteeChat {
            constructor() {
                this.messages = [];
                this.userId = this.getOrCreateUserId();
                this.username = this.getOrCreateUsername();
                this.sha = null;
                this.isLoading = false;
                this.isOnline = true;
                this.retryCount = 0;
                this.lastUpdateTime = 0;
                this.debugMode = true;
                this.imageQueue = [];
                this.uploadingImages = false;
                this.audioQueue = [];
                this.uploadingAudio = false;
                
                // 懒加载相关
                this.lazyLoadObserver = null;
                this.loadedImages = new Set();
                this.loadedAudios = new Set();
                this.imageLoadQueue = new Map();
                this.audioLoadQueue = new Map();
                
                // 状态缓存
                this.displayedImages = new Set();
                this.displayedImageElements = new Map();
                this.audioElements = new Map();
                
                // 滚动控制相关
                this.isUserScrolling = false;
                this.lastScrollPosition = 0;
                this.lastScrollHeight = 0;
                this.isAtBottom = true;
                this.scrollTimeout = null;
                this.newMessageCount = 0;
                this.autoScrollEnabled = true;
                this.shouldPreserveScroll = false;
                
                // 选择控制相关
                this.isUserSelecting = false;
                this.selectionStartTime = 0;
                this.lastSelectionRange = null;
                
                // 语音录制相关
                this.isRecording = false;
                this.mediaRecorder = null;
                this.audioChunks = [];
                this.recordingStartTime = 0;
                this.recordingTimer = null;
                this.recordingDuration = 0;
                this.audioContext = null;
                this.analyser = null;
                this.visualizerInterval = null;
                this.recordingCanvas = null;
                this.recordingCtx = null;
                
                // 音频播放相关
                this.currentAudio = null;
                this.currentAudioElement = null;
                this.audioCache = new Map();
                
                this.init();
            }
            
            // 初始化
            async init() {
                this.displayUsername();
                this.setupEventListeners();
                this.initLazyLoadObserver();
                await this.loadMessages();
                this.startAutoRefresh();
                this.updateStatus('在线');
                
                // 初始化滚动监听
                this.initScrollTracking();
            }
            
            // 初始化懒加载观察器
            initLazyLoadObserver() {
                if (this.lazyLoadObserver) {
                    this.lazyLoadObserver.disconnect();
                }
                
                this.lazyLoadObserver = new IntersectionObserver(
                    (entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                const element = entry.target;
                                if (element.classList.contains('lazy-image')) {
                                    this.preloadImage(element.dataset.src);
                                }
                            }
                        });
                    },
                    {
                        root: null,
                        rootMargin: `${APP_CONFIG.LAZY_LOAD_THRESHOLD}px`,
                        threshold: 0.01
                    }
                );
            }
            
            // 初始化滚动跟踪
            initScrollTracking() {
                const chatContainer = document.getElementById('chatContainer');
                
                chatContainer.addEventListener('scroll', () => {
                    this.handleScroll();
                });
                
                // 检查用户是否在底部
                this.checkIfAtBottom();
            }
            
            // 处理滚动
            handleScroll() {
                const chatContainer = document.getElementById('chatContainer');
                const scrollTop = chatContainer.scrollTop;
                const scrollHeight = chatContainer.scrollHeight;
                const clientHeight = chatContainer.clientHeight;
                
                // 标记用户正在滚动
                this.isUserScrolling = true;
                
                // 检查是否在底部
                const distanceToBottom = Math.abs(scrollHeight - scrollTop - clientHeight);
                this.isAtBottom = distanceToBottom <= APP_CONFIG.AUTO_SCROLL_THRESHOLD;
                
                // 如果用户滚动到底部，隐藏新消息提示
                if (this.isAtBottom) {
                    this.hideNewMessageIndicator();
                    this.newMessageCount = 0;
                }
                
                // 清除之前的滚动停止检测
                if (this.scrollTimeout) {
                    clearTimeout(this.scrollTimeout);
                }
                
                // 检测滚动停止
                this.scrollTimeout = setTimeout(() => {
                    this.isUserScrolling = false;
                    
                    // 保存当前滚动位置
                    this.lastScrollPosition = scrollTop;
                    this.lastScrollHeight = scrollHeight;
                    
                    // 如果用户在底部附近，启用自动滚动
                    if (this.isAtBottom) {
                        this.autoScrollEnabled = true;
                    }
                }, 150);
            }
            
            // 检查是否在底部
            checkIfAtBottom() {
                const chatContainer = document.getElementById('chatContainer');
                const scrollTop = chatContainer.scrollTop;
                const scrollHeight = chatContainer.scrollHeight;
                const clientHeight = chatContainer.clientHeight;
                
                const distanceToBottom = Math.abs(scrollHeight - scrollTop - clientHeight);
                this.isAtBottom = distanceToBottom <= APP_CONFIG.AUTO_SCROLL_THRESHOLD;
                
                return this.isAtBottom;
            }
            
            // 显示新消息提示
            showNewMessageIndicator(count = 1) {
                const indicator = document.getElementById('newMessageIndicator');
                if (count > 1) {
                    indicator.innerHTML = `<span>${count} 条新消息</span><span>↓</span>`;
                } else {
                    indicator.innerHTML = '<span>有新的消息</span><span>↓</span>';
                }
                indicator.classList.add('show');
            }
            
            // 隐藏新消息提示
            hideNewMessageIndicator() {
                const indicator = document.getElementById('newMessageIndicator');
                indicator.classList.remove('show');
            }
            
            // 滚动到底部（智能）
            scrollToBottom(force = false) {
                if (!force && !this.autoScrollEnabled) {
                    return;
                }
                
                const chatContainer = document.getElementById('chatContainer');
                if (chatContainer) {
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    this.hideNewMessageIndicator();
                    this.newMessageCount = 0;
                }
            }
            
            // 恢复滚动位置
            restoreScrollPosition() {
                const chatContainer = document.getElementById('chatContainer');
                if (!chatContainer || !this.shouldPreserveScroll) return;
                
                // 计算比例位置
                const oldScrollHeight = this.lastScrollHeight;
                const newScrollHeight = chatContainer.scrollHeight;
                
                if (oldScrollHeight > 0 && newScrollHeight > 0) {
                    // 保持相对位置
                    const ratio = this.lastScrollPosition / oldScrollHeight;
                    const newPosition = ratio * newScrollHeight;
                    
                    // 应用新位置
                    chatContainer.scrollTop = newPosition;
                    
                    // 如果用户在底部附近，则滚动到底部
                    if (this.isAtBottom) {
                        setTimeout(() => {
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }, 10);
                    }
                }
                
                this.shouldPreserveScroll = false;
            }
            
            // 预加载图片
            preloadImage(imageUrl) {
                if (this.loadedImages.has(imageUrl) || this.imageLoadQueue.has(imageUrl)) {
                    return;
                }
                
                this.imageLoadQueue.set(imageUrl, true);
                
                const img = new Image();
                img.onload = () => {
                    this.loadedImages.add(imageUrl);
                    this.imageLoadQueue.delete(imageUrl);
                };
                img.onerror = () => {
                    this.imageLoadQueue.delete(imageUrl);
                };
                img.src = this.getProxyUrl(imageUrl);
            }
            
            // 预加载音频
            preloadAudio(audioUrl) {
                if (this.loadedAudios.has(audioUrl) || this.audioLoadQueue.has(audioUrl)) {
                    return;
                }
                
                this.audioLoadQueue.set(audioUrl, true);
                
                const audio = new Audio(this.getProxyUrl(audioUrl));
                audio.preload = 'metadata';
                audio.onloadedmetadata = () => {
                    this.loadedAudios.add(audioUrl);
                    this.audioCache.set(audioUrl, audio);
                    this.audioLoadQueue.delete(audioUrl);
                };
                audio.onerror = () => {
                    this.audioLoadQueue.delete(audioUrl);
                };
            }
            
            // 获取代理URL
            getProxyUrl(url) {
                // 使用https://api.codetabs.com/v1/proxy?quest=格式
                return `${GITEE_CONFIG.CORS_PROXY}${encodeURIComponent(url)}`;
            }
            
            // 获取或创建用户ID
            getOrCreateUserId() {
                let userId = localStorage.getItem('chat_userId');
                if (!userId) {
                    userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('chat_userId', userId);
                }
                return userId;
            }
            
            // 获取或创建用户名
            getOrCreateUsername() {
                let username = localStorage.getItem('chat_username');
                if (!username) {
                    const randomIndex = Math.floor(Math.random() * USER_CONFIG.USERNAME_LIST.length);
                    username = USER_CONFIG.USERNAME_LIST[randomIndex];
                    localStorage.setItem('chat_username', username);
                    
                    setTimeout(() => {
                        this.addSystemMessage(`欢迎 ${username} 加入聊天室`);
                    }, 1000);
                }
                return username;
            }
            
            // 显示用户名
            displayUsername() {
                document.getElementById('username').textContent = this.username;
            }
            
            // 从Gitee加载消息
            async loadMessages() {
                if (this.isLoading) return;
                
                this.isLoading = true;
                
                // 保存当前滚动状态
                this.saveScrollState();
                
                try {
                    const apiUrl = `${GITEE_CONFIG.API_BASE}/repos/${GITEE_CONFIG.OWNER}/${GITEE_CONFIG.REPO}/contents/${GITEE_CONFIG.FILE_PATH}?access_token=${GITEE_CONFIG.ACCESS_TOKEN}`;
                    
                    const response = await fetch(apiUrl, {
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!response.ok) {
                        if (response.status === 404) {
                            this.messages = [];
                            this.sha = null;
                            this.renderMessages();
                            this.updateStatus('在线');
                            this.enableInput();
                            return;
                        } else if (response.status === 403 || response.status === 401) {
                            throw new Error('访问令牌无效或权限不足');
                        } else {
                            throw new Error(`HTTP错误: ${response.status}`);
                        }
                    }
                    
                    const data = await response.json();
                    
                    let content = '';
                    try {
                        if (data.content) {
                            content = this.decodeBase64(data.content);
                        } else {
                            throw new Error('文件内容为空');
                        }
                    } catch (e) {
                        throw new Error('文件格式错误，无法解码');
                    }
                    
                    this.sha = data.sha;
                    
                    try {
                        const newMessages = JSON.parse(content || '[]');
                        
                        // 检测新消息数量
                        if (this.messages.length > 0 && newMessages.length > this.messages.length) {
                            const oldCount = this.messages.length;
                            const newCount = newMessages.length;
                            const addedCount = newCount - oldCount;
                            
                            // 如果用户不在底部，显示新消息提示
                            if (!this.isAtBottom && !this.isUserScrolling) {
                                this.newMessageCount += addedCount;
                                this.showNewMessageIndicator(this.newMessageCount);
                            }
                        }
                        
                        this.messages = newMessages;
                    } catch (e) {
                        this.messages = [];
                    }
                    
                    if (this.messages.length > APP_CONFIG.MAX_MESSAGES) {
                        this.messages = this.messages.slice(-APP_CONFIG.MAX_MESSAGES);
                    }
                    
                    // 智能渲染消息
                    this.smartRenderMessages();
                    this.retryCount = 0;
                    this.updateStatus('在线');
                    this.enableInput();
                    this.hideError();
                    
                } catch (error) {
                    this.retryCount++;
                    
                    if (this.retryCount <= GITEE_CONFIG.MAX_RETRIES) {
                        this.updateStatus(`重试中 (${this.retryCount}/${GITEE_CONFIG.MAX_RETRIES})`);
                        this.showError(`加载失败，正在重试... (${this.retryCount}/${GITEE_CONFIG.MAX_RETRIES})`);
                        
                        setTimeout(() => this.loadMessages(), 2000 * this.retryCount);
                    } else {
                        this.updateStatus('离线', 'error');
                        this.showError('连接失败，请检查网络或配置');
                        this.disableInput();
                    }
                } finally {
                    this.isLoading = false;
                }
            }
            
            // 保存滚动状态
            saveScrollState() {
                const chatContainer = document.getElementById('chatContainer');
                if (chatContainer) {
                    this.lastScrollPosition = chatContainer.scrollTop;
                    this.lastScrollHeight = chatContainer.scrollHeight;
                    this.shouldPreserveScroll = APP_CONFIG.KEEP_SCROLL_POSITION && !this.isAtBottom;
                }
            }
            
            // 智能渲染消息 - 保留已加载的图片状态
            smartRenderMessages() {
                const chatContainer = document.getElementById('chatContainer');
                
                // 获取当前显示的图片元素
                const currentImages = chatContainer.querySelectorAll('.message-image.loaded');
                currentImages.forEach(img => {
                    const src = img.src;
                    if (src) {
                        this.displayedImages.add(src);
                        this.displayedImageElements.set(src, img.cloneNode(true));
                    }
                });
                
                // 渲染消息
                this.renderMessages();
            }
            
            // 保存消息到Gitee
            async saveMessages() {
                try {
                    const content = JSON.stringify(this.messages, null, 2);
                    const encodedContent = this.encodeBase64(content);
                    
                    const apiUrl = `${GITEE_CONFIG.API_BASE}/repos/${GITEE_CONFIG.OWNER}/${GITEE_CONFIG.REPO}/contents/${GITEE_CONFIG.FILE_PATH}?access_token=${GITEE_CONFIG.ACCESS_TOKEN}`;
                    
                    const body = {
                        content: encodedContent,
                        message: `更新消息 - ${new Date().toISOString()}`,
                        sha: this.sha
                    };
                    
                    const response = await fetch(apiUrl, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(body)
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json();
                        
                        if (response.status === 409) {
                            await this.loadMessages();
                            return await this.saveMessages();
                        }
                        
                        throw new Error(`保存失败: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    this.sha = data.content.sha;
                    return true;
                    
                } catch (error) {
                    return false;
                }
            }
            
            // 发送消息
            async sendMessage(text, images = [], audioUrl = null) {
                if (!text.trim() && images.length === 0 && !audioUrl) return false;
                
                // 如果有图片，先上传图片
                let imageUrls = [];
                if (images.length > 0) {
                    imageUrls = await this.uploadImages(images);
                    if (imageUrls.length === 0 && !text.trim() && !audioUrl) {
                        this.showError('图片上传失败');
                        return false;
                    }
                }
                
                const message = {
                    id: Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                    userId: this.userId,
                    username: this.username,
                    text: text.trim(),
                    images: imageUrls,
                    audio: audioUrl,
                    timestamp: Date.now(),
                    time: this.formatTime(new Date())
                };
                
                // 临时显示消息
                this.messages.push(message);
                this.renderMessages();
                
                // 发送消息后总是滚动到底部
                this.autoScrollEnabled = true;
                this.scrollToBottom(true);
                
                // 保存到Gitee
                const sendBtn = document.getElementById('sendBtn');
                const originalText = sendBtn.textContent;
                sendBtn.textContent = '发送中...';
                sendBtn.disabled = true;
                
                const success = await this.saveMessages();
                
                sendBtn.textContent = originalText;
                sendBtn.disabled = false;
                
                if (success) {
                    setTimeout(() => this.loadMessages(), 500);
                } else {
                    this.showError('发送失败，请稍后重试');
                }
                
                return success;
            }
            
            // 上传图片到Gitee
            async uploadImages(imageFiles) {
                const imageUrls = [];
                this.uploadingImages = true;
                
                for (let i = 0; i < imageFiles.length; i++) {
                    const file = imageFiles[i];
                    
                    try {
                        if (file.size > APP_CONFIG.MAX_IMAGE_SIZE) {
                            this.showError(`图片 ${file.name} 超过${APP_CONFIG.MAX_IMAGE_SIZE / 1024 / 1024}MB限制`);
                            continue;
                        }
                        
                        let processedFile = file;
                        if (file.size > APP_CONFIG.COMPRESS_THRESHOLD) {
                            processedFile = await this.compressImage(file);
                        }
                        
                        const timestamp = Date.now();
                        const randomStr = Math.random().toString(36).substr(2, 6);
                        const fileExt = file.name.split('.').pop() || 'jpg';
                        const fileName = `${timestamp}_${randomStr}.${fileExt}`;
                        const filePath = `${GITEE_CONFIG.IMAGE_DIR}/${fileName}`;
                        
                        const base64Data = await this.fileToBase64(processedFile);
                        const base64Content = base64Data.split(',')[1];
                        
                        const apiUrl = `${GITEE_CONFIG.API_BASE}/repos/${GITEE_CONFIG.OWNER}/${GITEE_CONFIG.REPO}/contents/${filePath}?access_token=${GITEE_CONFIG.ACCESS_TOKEN}`;
                        
                        const body = {
                            content: base64Content,
                            message: `上传图片 ${fileName}`,
                            branch: 'master'
                        };
                        
                        const response = await fetch(apiUrl, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(body)
                        });
                        
                        if (!response.ok) {
                            throw new Error(`上传失败: ${response.status}`);
                        }
                        
                        const data = await response.json();
                        const rawUrl = `https://gitee.com/${GITEE_CONFIG.OWNER}/${GITEE_CONFIG.REPO}/raw/master/${filePath}`;
                        imageUrls.push(rawUrl);
                        
                    } catch (error) {
                        this.showError(`图片 ${file.name} 上传失败: ${error.message}`);
                    }
                }
                
                this.uploadingImages = false;
                return imageUrls;
            }
            
            // 上传音频到Gitee
            async uploadAudio(audioBlob) {
                try {
                    if (this.recordingDuration > APP_CONFIG.MAX_AUDIO_DURATION) {
                        this.showError(`语音超过${APP_CONFIG.MAX_AUDIO_DURATION}秒限制`);
                        return null;
                    }

                    const apiUrl = `${GITEE_CONFIG.API_BASE}/repos/${GITEE_CONFIG.OWNER}/${GITEE_CONFIG.REPO}/contents/${filePath}?access_token=${GITEE_CONFIG.ACCESS_TOKEN}`;
                    
                    const body = {
