<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>知音 · 典藏音乐</title>
    <!-- 引入权威无衬线字体 Inter & 系统回退 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #0B0C0E;
            color: #EFF1F3;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* 整体应用容器 */
        .app {
            max-width: 1440px;
            margin: 0 auto;
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #111215, #090A0C);
            box-shadow: 0 0 80px rgba(0,0,0,0.5);
        }

        /* 主内容区 */
        .main-view {
            padding: 32px 40px 100px 40px;
        }

        @media (max-width: 768px) {
            .main-view {
                padding: 20px 20px 90px 20px;
            }
        }

        /* 登录卡片容器 */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
        }

        .login-card {
            background: rgba(18, 20, 24, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 48px;
            width: 100%;
            max-width: 520px;
            padding: 40px 36px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }

        .login-tabs {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            font-weight: 600;
            font-family: inherit;
            color: #8E8E93;
            cursor: pointer;
            padding: 4px 0;
            transition: 0.2s;
            letter-spacing: -0.3px;
        }

        .tab-btn.active {
            color: #F5F5F7;
            border-bottom: 2px solid #D4AF37;
            margin-bottom: -13px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #A1A1A6;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            background: #1C1E24;
            border: 1px solid #2C2E36;
            border-radius: 24px;
            padding: 14px 18px;
            font-size: 1rem;
            font-family: inherit;
            color: #FFFFFF;
            transition: all 0.2s;
            outline: none;
        }

        .input-field:focus {
            border-color: #D4AF37;
            background: #23252D;
        }

        .captcha-row {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .captcha-row .input-field {
            flex: 1;
        }

        .send-code-btn {
            background: #2C2E36;
            border: none;
            border-radius: 40px;
            padding: 0 20px;
            font-weight: 600;
            font-family: inherit;
            color: #EFF1F3;
            cursor: pointer;
            white-space: nowrap;
            height: 52px;
            transition: 0.2s;
        }

        .send-code-btn:active { background: #3A3D46; }
        .send-code-btn.disabled { opacity: 0.5; pointer-events: none; }

        .login-btn {
            width: 100%;
            background: #D4AF37;
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: 700;
            font-size: 1rem;
            font-family: inherit;
            color: #0B0C0E;
            cursor: pointer;
            margin-top: 16px;
            transition: 0.2s;
        }

        .login-btn:active { background: #BF9F2E; transform: scale(0.98);}

        .qr-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .qr-canvas {
            background: white;
            padding: 12px;
            border-radius: 28px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .qr-canvas img {
            width: 200px;
            height: 200px;
            display: block;
        }

        .qr-tip {
            font-size: 0.85rem;
            color: #AEAEB2;
            text-align: center;
        }

        /* 歌单页面 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #F5F5F7 0%, #D4AF37 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logout-btn {
            background: #1F2128;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 500;
            font-family: inherit;
            color: #EFF1F3;
            cursor: pointer;
            transition: 0.2s;
        }

        .playlist-meta {
            margin-bottom: 28px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .playlist-name {
            font-size: 1.7rem;
            font-weight: 600;
        }

        .song-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.02);
            transition: 0.2s;
            cursor: pointer;
            gap: 16px;
        }

        .song-item:hover {
            background: rgba(212, 175, 55, 0.12);
            transform: translateX(4px);
        }

        .song-index {
            font-size: 1rem;
            font-weight: 500;
            color: #8E8E93;
            width: 32px;
        }

        .song-info {
            flex: 1;
        }

        .song-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .song-artist {
            font-size: 0.8rem;
            color: #9A9BA2;
            margin-top: 4px;
        }

        .duration {
            font-size: 0.8rem;
            color: #9A9BA2;
            font-feature-settings: 'tnum';
        }

        /* 底部播放条 (简洁) */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111216E6;
            backdrop-filter: blur(32px);
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 100;
            flex-wrap: wrap;
        }

        .now-playing {
            min-width: 180px;
        }

        .now-title {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .ctrl-btn {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: #EFF1F3;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            transition: 0.1s;
        }

        .ctrl-btn:active { background: #2C2E36; }

        .progress-container {
            flex: 2;
            min-width: 200px;
        }

        .progress-bar {
            background: #2C2E36;
            height: 4px;
            border-radius: 4px;
            cursor: pointer;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #D4AF37;
            border-radius: 4px;
        }

        .time-info {
            font-size: 0.75rem;
            color: #9A9BA2;
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
        }

        /* 播放器详细页 (modal风格) */
        .player-detail {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0A0B0E;
            z-index: 200;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 28px 24px 100px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .player-detail.open {
            transform: translateY(0);
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .close-detail {
            background: #1F2128;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 500;
            cursor: pointer;
            color: white;
        }

        .detail-song-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .detail-artist {
            color: #B0B0B5;
            margin-bottom: 32px;
        }

        .lyrics-box {
            background: #121318;
            border-radius: 28px;
            padding: 24px;
            font-size: 1rem;
            line-height: 1.75;
            white-space: pre-wrap;
            font-family: 'Inter', monospace;
            max-height: 55vh;
            overflow-y: auto;
            border: 1px solid #292C34;
        }

        .lyrics-placeholder {
            color: #6C6E75;
            text-align: center;
        }

        @keyframes subtlePulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .loading-text {
            animation: subtlePulse 1s infinite;
        }

        button {
            font-family: inherit;
        }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
    // ---------- 全局变量与工具函数 ----------
    const API_BASE = 'https://kapi.344977.xyz';
    let currentDfid = localStorage.getItem('dfid') || '';
    let authToken = localStorage.getItem('token') || '';
    let userId = localStorage.getItem('userid') || '';
    let cookieStr = '';   // 每次请求动态构建
    let loginExpire = localStorage.getItem('login_expire') || 0;
    let currentSongList = [];      // 歌单歌曲列表
    let currentPlaylistId = 1;     // 固定ID 1
    let audioElement = null;
    let currentSongIndex = -1;
    let currentSongObj = null;
    let cachedSongUrls = new Map(); // 缓存 { hash_quality: url }
    let isPlayerDetailOpen = false;
    let loginViewMode = 'phone';    // 'phone' or 'qr'
    let qrPollingInterval = null;

    // 辅助函数: 更新cookie字符串 (每次请求前更新)
    function buildCookie() {
        let df = currentDfid || '';
        return `token=${authToken};userid=${userId};dfid=${df}`;
    }

    // 通用请求封装，自动加timestamp & cookie参数
    async function apiRequest(endpoint, extraParams = {}, method = 'GET') {
        const params = new URLSearchParams({
            timestamp: Date.now(),
            ...extraParams
        });
        if (!params.has('cookie')) {
            params.append('cookie', buildCookie());
        }
        const url = `${API_BASE}${endpoint}?${params.toString()}`;
        const res = await fetch(url, { method, credentials: 'omit' });
        const json = await res.json();
        if (json.status !== 1 && json.error_code !== 0) {
            console.warn(`API warning: ${endpoint}`, json);
        }
        return json;
    }

    // 从set-cookie头解析指定cookie值 (因为登录接口直接set-cookie)
    function extractCookieFromHeaders(headers, name) {
        const setCookie = headers.get('Set-Cookie');
        if (!setCookie) return '';
        const parts = setCookie.split(/,\s*/);
        for (let part of parts) {
            if (part.trim().startsWith(name + '=')) {
                let match = part.match(new RegExp(`${name}=([^;]+)`));
                if (match) return match[1];
            }
        }
        return '';
    }

    // 注册设备获取初始dfid (若没有)
    async function ensureDevice() {
        if (currentDfid) return currentDfid;
        const res = await fetch(`${API_BASE}/register/dev?timestamp=${Date.now()}`);
        const data = await res.json();
        if (data.status === 1 && data.data?.dfid) {
            currentDfid = data.data.dfid;
            localStorage.setItem('dfid', currentDfid);
        } else {
            // fallback
            currentDfid = 'guest_' + Date.now();
        }
        return currentDfid;
    }

    // 检测登录态
    function isLoggedIn() {
        if (!authToken || !userId) return false;
        const expire = parseInt(loginExpire);
        if (Date.now() > expire) {
            clearAuth();
            return false;
        }
        return true;
    }

    function clearAuth() {
        authToken = '';
        userId = '';
        currentDfid = '';
        localStorage.removeItem('token');
        localStorage.removeItem('userid');
        localStorage.removeItem('dfid');
        localStorage.removeItem('login_expire');
        if (qrPollingInterval) clearInterval(qrPollingInterval);
        if (audioElement) { audioElement.pause(); audioElement = null; }
        currentSongObj = null;
        cookieStr = '';
    }

    function setAuth(token, uid, dfid, expireMinutes = 30) {
        authToken = token;
        userId = uid;
        if (dfid) currentDfid = dfid;
        const expireTime = Date.now() + expireMinutes * 60 * 1000;
        loginExpire = expireTime;
        localStorage.setItem('token', token);
        localStorage.setItem('userid', uid);
        localStorage.setItem('dfid', currentDfid);
        localStorage.setItem('login_expire', expireTime.toString());
    }

    // 验证码登录逻辑
    async function sendCaptcha(mobile) {
        if (!mobile || mobile.length !== 11) throw new Error('请输入11位手机号');
        await ensureDevice();
        const res = await apiRequest('/captcha/sent', { mobile, cookie: buildCookie() });
        if (res.status === 1) return true;
        throw new Error(res.errmsg || '发送验证码失败');
    }

    async function loginWithCode(mobile, code) {
        await ensureDevice();
        const res = await apiRequest('/login/cellphone', { mobile, code, cookie: buildCookie() });
        if (res.status === 1 && res.data?.token && res.data?.userid) {
            // 登录成功, 同时可获取新的dfid (从headers或者从body中无dfid，但后续请求会用cookie中的dfid)
            // 注意：实际Set-Cookie 会设置新的dfid，但我们直接保存从body拿到的token,userid，dfid沿用现有或重新请求register/dev?
            // 最好再拉取一次user/detail获取新dfid？但后续歌单请求cookie里会更新 dfid 其实从register/dev获取足以，
            // 但从请求记录看登录后dfid变化，我们重新register一次即可。
            const reg = await apiRequest('/register/dev', {});
            if (reg.data?.dfid) currentDfid = reg.data.dfid;
            setAuth(res.data.token, res.data.userid, currentDfid);
            return true;
        }
        throw new Error(res.errmsg || '登录失败');
    }

    // 二维码登录流程
    let currentQrKey = '';
    async function initQrLogin() {
        await ensureDevice();
        // 获取key
        const keyRes = await apiRequest('/login/qr/key', {});
        if (keyRes.status !== 1 || !keyRes.data?.key) throw new Error('获取二维码key失败');
        const key = keyRes.data.key;
        currentQrKey = key;
        // 创建二维码图片
        const qrRes = await apiRequest('/login/qr/create', { key, qrimg: 1 });
        if (qrRes.status !== 1 || !qrRes.data?.qrcode_img) throw new Error('生成二维码失败');
        return { key, qrcodeImg: qrRes.data.qrcode_img };
    }

    async function pollQrStatus(key, onSuccess, onError) {
        if (qrPollingInterval) clearInterval(qrPollingInterval);
        qrPollingInterval = setInterval(async () => {
            try {
                const checkRes = await apiRequest('/login/qr/check', { key });
                if (checkRes.status === 1) {
                    const data = checkRes.data;
                    if (data.code === 1) {
                        // 等待扫码中
                        return;
                    } else if (data.code === 2) {
                        // 已扫码待确认
                        // 继续等待
                    } else if (data.code === 0 && data.userinfo) {
                        // 登录成功
                        clearInterval(qrPollingInterval);
                        qrPollingInterval = null;
                        const token = data.userinfo.token;
                        const uid = data.userinfo.userid;
                        if (token && uid) {
                            const reg = await apiRequest('/register/dev', {});
                            const dfidNew = reg.data?.dfid || currentDfid;
                            setAuth(token, uid, dfidNew);
                            onSuccess();
                        } else {
                            onError('未返回token');
                        }
                    } else if (data.code === -1) {
                        clearInterval(qrPollingInterval);
                        onError('二维码已过期');
                    }
                }
            } catch(e) {
                console.error(e);
            }
        }, 2000);
    }

    // 获取歌单列表 (筛选listid=1)
    async function fetchUserPlaylists() {
        const res = await apiRequest('/user/playlist', {});
        if (res.status === 1 && res.data?.info) {
            const target = res.data.info.find(p => p.listid == currentPlaylistId);
            return target || null;
        }
        return null;
    }

    // 获取歌单内歌曲 (listid=1)
    async function fetchPlaylistSongs(listid, page = 1, pagesize = 100) {
        const res = await apiRequest('/playlist/track/all/new', { listid, page, pagesize });
        if (res.status === 1 && res.data?.info) {
            return res.data.info; // 歌曲列表
        }
        return [];
    }

    // 获取歌曲播放url (128k)
    async function getSongUrl(hash, albumAudioId) {
        const cacheKey = `${hash}_128`;
        if (cachedSongUrls.has(cacheKey)) return cachedSongUrls.get(cacheKey);
        try {
            const res = await apiRequest('/song/url', { hash, quality: '128', album_audio_id: albumAudioId });
            if (res.url && res.url.length) {
                const playUrl = res.url[0];
                cachedSongUrls.set(cacheKey, playUrl);
                return playUrl;
            }
            return null;
        } catch(e) { return null; }
    }

    // 获取歌词 (展示候选第一条歌词内容, 实际需要获取内容，但API返回只有元数据；我们尝试请求/lyric/down?hash= 但未经验证, 此处显示占位，同时尝试从候选content抓取)
    async function fetchLyrics(hash) {
        try {
            const res = await apiRequest('/search/lyric', { hash });
            if (res.candidates && res.candidates.length > 0) {
                // 候选歌词有id, 但没有直接文本，现实中需二次请求，为演示优雅降级
                return `[ 歌词待加载 ]\n推荐译制: ${res.candidates[0].nickname || '音乐人'}\n暂无完整歌词，敬请欣赏旋律。`;
            }
            return '暂无歌词，沉浸于音乐世界。';
        } catch(e) {
            return '歌词获取失败。';
        }
    }

    // 渲染app主视图
    function renderApp() {
        const appDiv = document.getElementById('app');
        if (!isLoggedIn()) {
            renderLoginScreen(appDiv);
        } else {
            renderHomeScreen(appDiv);
        }
    }

    function renderLoginScreen(container) {
        container.innerHTML = `
            <div class="login-container">
                <div class="login-card">
                    <div class="login-tabs">
                        <button class="tab-btn ${loginViewMode === 'phone' ? 'active' : ''}" data-mode="phone">手机号</button>
                        <button class="tab-btn ${loginViewMode === 'qr' ? 'active' : ''}" data-mode="qr">扫码登录</button>
                    </div>
                    <div id="loginPanel"></div>
                </div>
            </div>
        `;
        const tabs = container.querySelectorAll('.tab-btn');
        tabs.forEach(btn => {
            btn.addEventListener('click', (e) => {
                loginViewMode = btn.dataset.mode;
                renderLoginScreen(container);
            });
        });
        const panelDiv = container.querySelector('#loginPanel');
        if (loginViewMode === 'phone') {
            renderPhoneLogin(panelDiv);
        } else {
            renderQrLogin(panelDiv);
        }
    }

    function renderPhoneLogin(panel) {
        panel.innerHTML = `
            <div class="input-group">
                <div class="input-label">手机号码</div>
                <input type="tel" id="mobileInput" class="input-field" placeholder="186 7410 1161" value="18674101161">
            </div>
            <div class="input-group">
                <div class="input-label">验证码</div>
                <div class="captcha-row">
                    <input type="text" id="codeInput" class="input-field" placeholder="6位验证码">
                    <button id="sendCodeBtn" class="send-code-btn">发送验证码</button>
                </div>
            </div>
            <button id="loginBtn" class="login-btn">登录 · 知音典藏</button>
        `;
        const sendBtn = panel.querySelector('#sendCodeBtn');
        const loginBtn = panel.querySelector('#loginBtn');
        const mobileInp = panel.querySelector('#mobileInput');
        const codeInp = panel.querySelector('#codeInput');

        let countdown = 0;
        function updateSendBtn() {
            if (countdown > 0) {
                sendBtn.textContent = `${countdown}s`;
                sendBtn.classList.add('disabled');
                countdown--;
                setTimeout(updateSendBtn, 1000);
            } else {
                sendBtn.textContent = '发送验证码';
                sendBtn.classList.remove('disabled');
            }
        }
        sendBtn.addEventListener('click', async () => {
            if (countdown > 0) return;
            const mobile = mobileInp.value.trim();
            if (!/^1[3-9]\d{9}$/.test(mobile)) {
                alert('请输入正确手机号');
                return;
            }
            sendBtn.textContent = '发送中...';
            try {
                await sendCaptcha(mobile);
                countdown = 60;
                updateSendBtn();
                alert('验证码已发送');
            } catch(err) { alert(err.message); sendBtn.textContent = '发送验证码'; }
        });

        loginBtn.addEventListener('click', async () => {
            const mobile = mobileInp.value.trim();
            const code = codeInp.value.trim();
            if (!mobile || !code) return alert('填写完整');
            loginBtn.textContent = '登录中...';
            try {
                await loginWithCode(mobile, code);
                renderApp();
            } catch(e) { alert(e.message); }
            finally { loginBtn.textContent = '登录 · 知音典藏'; }
        });
    }

    function renderQrLogin(panel) {
        panel.innerHTML = `
            <div class="qr-wrapper">
                <div class="qr-canvas" id="qrImageContainer"></div>
                <div class="qr-tip">打开酷狗音乐APP扫码<br>授权后自动登录</div>
                <button id="refreshQrBtn" class="send-code-btn" style="background:#2C2E36;">刷新二维码</button>
            </div>
        `;
        let currentQrImg = null;
        async function loadQr() {
            try {
                const { key, qrcodeImg } = await initQrLogin();
                const container = panel.querySelector('#qrImageContainer');
                container.innerHTML = `<img src="${qrcodeImg}" alt="登录二维码" style="width:200px;height:200px;">`;
                if (qrPollingInterval) clearInterval(qrPollingInterval);
                pollQrStatus(key, () => {
                    renderApp();
                }, (err) => { alert('二维码登录失败：'+err); renderLoginScreen(document.getElementById('app')); });
            } catch(err) { alert('生成二维码失败:'+err.message); }
        }
        loadQr();
        const refreshBtn = panel.querySelector('#refreshQrBtn');
        if(refreshBtn) refreshBtn.addEventListener('click', () => { if(qrPollingInterval) clearInterval(qrPollingInterval); loadQr(); });
    }

    // 主界面：歌单+底部播放条+全屏播放器
    async function renderHomeScreen(container) {
        container.innerHTML = `
            <div class="main-view">
                <div class="header">
                    <div class="page-title">典藏 · 私藏集</div>
                    <button id="logoutHeaderBtn" class="logout-btn">退出登录</button>
                </div>
                <div class="playlist-meta">
                    <div class="playlist-name" id="playlistName">加载歌单...</div>
                </div>
                <div class="song-list" id="songListContainer">
                    <div style="text-align:center;padding:60px;">加载中...</div>
                </div>
            </div>
            <div class="player-bar" id="playerBar" style="display: none;">
                <div class="now-playing"><div class="now-title" id="nowPlayingTitle">未播放</div></div>
                <div class="controls">
                    <button id="prevBtn" class="ctrl-btn">⏮</button>
                    <button id="playPauseBtn" class="ctrl-btn">▶</button>
                    <button id="nextBtn" class="ctrl-btn">⏭</button>
                    <button id="openDetailBtn" class="ctrl-btn" style="font-size:1.2rem;">📄</button>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
                    <div class="time-info"><span id="currentTime">0:00</span><span id="durationTime">0:00</span></div>
                </div>
            </div>
            <div id="playerDetailModal" class="player-detail">
                <div class="detail-header"><div><div class="detail-song-title" id="detailSongTitle"></div><div class="detail-artist" id="detailArtist"></div></div><button class="close-detail" id="closeDetailBtn">返回歌单</button></div>
                <div class="lyrics-box" id="lyricsBox"><div class="lyrics-placeholder">加载歌词中...</div></div>
            </div>
        `;

        // 获取歌单信息及歌曲列表
        const playlist = await fetchUserPlaylists();
        const playlistNameSpan = container.querySelector('#playlistName');
        if (playlist) playlistNameSpan.innerText = playlist.name || '我的典藏';
        else playlistNameSpan.innerText = '默认收藏';
        let songs = await fetchPlaylistSongs(currentPlaylistId);
        if (!songs || songs.length === 0) {
            container.querySelector('#songListContainer').innerHTML = '<div style="padding:40px;text-align:center;">✨ 歌单还是空的，去听听每日推荐吧</div>';
        } else {
            currentSongList = songs;
            renderSongList(songs, container);
        }

        // 底部播放条控制
        const playerBar = container.querySelector('#playerBar');
        const playPauseBtn = container.querySelector('#playPauseBtn');
        const prevBtn = container.querySelector('#prevBtn');
        const nextBtn = container.querySelector('#nextBtn');
        const progressFill = container.querySelector('#progressFill');
        const progressBar = container.querySelector('#progressBar');
        const currentTimeSpan = container.querySelector('#currentTime');
        const durationSpan = container.querySelector('#durationTime');
        const openDetailBtn = container.querySelector('#openDetailBtn');
        const closeDetailBtn = container.querySelector('#closeDetailBtn');
        const detailModal = container.querySelector('#playerDetailModal');
        const detailTitle = container.querySelector('#detailSongTitle');
        const detailArtistSpan = container.querySelector('#detailArtist');
        const lyricsBox = container.querySelector('#lyricsBox');

        if (!audioElement) audioElement = new Audio();

        function updatePlayPauseUI() {
            if (audioElement.paused) playPauseBtn.textContent = '▶';
            else playPauseBtn.textContent = '⏸';
        }

        async function playSong(index) {
            if (index < 0 || index >= currentSongList.length) return;
            currentSongIndex = index;
            currentSongObj = currentSongList[index];
            const song = currentSongObj;
            const hash = song.hash;
            const albumAudioId = song.album_audio_id || song.mixsongid;
            if (!hash) return;
            const url = await getSongUrl(hash, albumAudioId);
            if (!url) { alert('无法获取播放链接'); return; }
            audioElement.src = url;
            audioElement.play().catch(e => console.warn);
            playerBar.style.display = 'flex';
            container.querySelector('#nowPlayingTitle').innerText = `${song.songname || '未知'} - ${song.author_name || '歌手'}`;
            detailTitle.innerText = song.songname || '无题';
            detailArtistSpan.innerText = song.author_name || '艺人';
            updatePlayPauseUI();
            // 加载歌词
            const lyricText = await fetchLyrics(hash);
            lyricsBox.innerHTML = `<div style="white-space:pre-wrap;">${escapeHtml(lyricText)}</div>`;
            // 更新进度条事件
            audioElement.ontimeupdate = () => {
                if (audioElement.duration) {
                    const percent = (audioElement.currentTime / audioElement.duration) * 100;
                    progressFill.style.width = `${percent}%`;
                    currentTimeSpan.innerText = formatTime(audioElement.currentTime);
                    durationSpan.innerText = formatTime(audioElement.duration);
                }
            };
            audioElement.onended = () => { playSong(currentSongIndex+1); };
        }

        function formatTime(sec) { if(isNaN(sec)) return '0:00'; const m = Math.floor(sec/60); const s = Math.floor(sec%60); return `${m}:${s<10?'0'+s:s}`; }

        playPauseBtn.addEventListener('click', () => { if(audioElement.src) { audioElement.paused ? audioElement.play() : audioElement.pause(); updatePlayPauseUI(); } });
        prevBtn.addEventListener('click', () => playSong(currentSongIndex-1));
        nextBtn.addEventListener('click', () => playSong(currentSongIndex+1));
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audioElement.duration) audioElement.currentTime = percent * audioElement.duration;
        });
        openDetailBtn.addEventListener('click', () => { detailModal.classList.add('open'); isPlayerDetailOpen=true; });
        closeDetailBtn.addEventListener('click', () => { detailModal.classList.remove('open'); });

        container.querySelector('#logoutHeaderBtn').addEventListener('click', () => { clearAuth(); renderApp(); });
    }

    function renderSongList(songs, container) {
        const listDiv = container.querySelector('#songListContainer');
        listDiv.innerHTML = '';
        songs.forEach((song, idx) => {
            const div = document.createElement('div');
            div.className = 'song-item';
            div.innerHTML = `
                <div class="song-index">${idx+1}</div>
                <div class="song-info"><div class="song-name">${escapeHtml(song.songname || '未知曲目')}</div><div class="song-artist">${escapeHtml(song.author_name || song.singerinfo?.map(s=>s.name).join(',') || '佚名')}</div></div>
                <div class="duration">${formatDuration(song.time_length || song.duration || 0)}</div>
            `;
            div.addEventListener('click', () => { 
                if(window.currentPlaySong) window.currentPlaySong(idx);
                else {
                    const playFunc = async () => { await window.playSongIndex(idx); };
                    window.playSongIndex = playFunc; playFunc();
                }
            });
            listDiv.appendChild(div);
        });
        window.playSongIndex = async (idx) => {
            if(!audioElement) audioElement = new Audio();
            await playSongLogic(idx, songs, container);
        };
        async function playSongLogic(idx, songArr, ctx) {
            if(idx<0||idx>=songArr.length) return;
            const song = songArr[idx];
            const hash = song.hash;
            const albumAudioId = song.album_audio_id || song.mixsongid;
            const url = await getSongUrl(hash, albumAudioId);
            if (!url) return alert('无法获取播放链接');
            audioElement.src = url;
            audioElement.play();
            ctx.querySelector('#nowPlayingTitle').innerText = `${song.songname} - ${song.author_name}`;
            if(ctx.querySelector('#detailSongTitle')) ctx.querySelector('#detailSongTitle').innerText = song.songname;
            if(ctx.querySelector('#detailArtist')) ctx.querySelector('#detailArtist').innerText = song.author_name;
            const lyric = await fetchLyrics(hash);
            if(ctx.querySelector('#lyricsBox')) ctx.querySelector('#lyricsBox').innerHTML = `<div>${escapeHtml(lyric)}</div>`;
            currentSongIndex = idx;
            currentSongObj = song;
            const playerBarEl = ctx.querySelector('#playerBar');
            if(playerBarEl) playerBarEl.style.display = 'flex';
        }
    }

    function formatDuration(sec) { if(!sec) return '0:00'; let s = Math.floor(sec); let m = Math.floor(s/60); s = s%60; return `${m}:${s<10?'0'+s:s}`; }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // 启动应用
    (async () => {
        await ensureDevice();
        renderApp();
    })();
</script>
</body>
</html>
