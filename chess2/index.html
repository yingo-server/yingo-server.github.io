<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chess · 国际象棋</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="transitionOverlay"></div>
    <div id="splash">
        <div class="splash-piece" id="splashPiece"></div>
    </div>
    <div id="reconnectModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>检测到可重连的房间</h3>
            <div id="reconnectList"></div>
            <div style="margin-top:16px; display:flex; gap:10px; justify-content:center;">
                <button id="reconnectBtn" class="vs-btn primary">重连</button>
                <button id="ignoreReconnectBtn" class="vs-btn secondary">忽略</button>
            </div>
        </div>
    </div>
    <div id="lobby" style="display:none;">
        <div class="lobby-container">
            <h1 class="logo">♞ Chess</h1>
            <div class="menu-buttons">
                <button id="localBtn" class="vs-btn primary">本地双人</button>
                <button id="onlineBtn" class="vs-btn primary">在线对战</button>
            </div>
        </div>
    </div>
    <div id="onlineMenu" style="display:none;">
        <div class="online-menu-container">
            <button id="backToLobbyBtn" class="vs-btn secondary back-btn">← 返回大厅</button>
            <h2>在线对战</h2>
            <div class="online-actions">
                <button id="createRoomBtn" class="vs-btn primary">创建房间</button>
                <button id="joinRoomBtn" class="vs-btn">加入房间</button>
            </div>
            <div id="roomInfo" class="room-info-box" style="display:none;">
                <p>房间号：<strong id="roomIdDisplay"></strong> <button id="copyRoomBtn" class="vs-btn small">复制</button></p>
                <p id="waitingText">等待对手加入...</p>
                <button id="cancelRoomBtn" class="vs-btn secondary small" style="margin-top:8px;">取消</button>
            </div>
            <div id="joinPanel" class="join-panel" style="display:none;">
                <input type="text" id="joinRoomIdInput" placeholder="输入房间号（5位）" maxlength="5" class="vs-input">
                <button id="joinSubmitBtn" class="vs-btn primary">加入</button>
                <p id="joinError" style="color:#e05555;display:none;margin-top:8px;"></p>
            </div>
        </div>
    </div>
    <div id="gameContainer" style="display:none;">
        <div class="app">
            <div class="title-bar">
                <span class="icon"><i class="fas fa-chess-king"></i></span>
                <span class="name" id="gameModeLabel">本地对战</span>
                <span style="flex:1;"></span>
                <div id="onlineButtons" style="display:none;">
                    <button id="drawBtn" class="title-btn">求和</button>
                    <button id="resignBtn" class="title-btn">认输</button>
                </div>
                <span id="roomDisplayInGame" class="room-info"></span>
                <span class="dot" id="statusDot"></span>
            </div>
            <div class="canvas-wrap">
                <canvas id="boardCanvas"></canvas>
            </div>
            <div class="status-bar">
                <span class="tdot w" id="turnDot"></span>
                <span id="turnText">白方走棋</span>
                <span id="moveCount" style="color:#555;">第1步</span>
                <button class="reset-btn" id="resetBtn">⟳ 重置</button>
            </div>
            <div class="promo-overlay" id="promoOverlay" style="display:none;">
                <div class="promo-dlg">
                    <span class="lbl">选择升变棋子</span>
                    <div class="promo-opts" id="promoOpts"></div>
                </div>
            </div>
        </div>
        <div id="avatarOpponentContainer" class="avatar-container opponent-container">
            <img id="avatarOpponent" class="avatar avatar-opponent" alt="对手头像">
            <div class="bubble opponent-bubble" style="display:none;"></div>
        </div>
        <div id="avatarSelfContainer" class="avatar-container self-container">
            <img id="avatarSelf" class="avatar avatar-self" alt="己方头像">
            <div class="bubble self-bubble" style="display:none;"></div>
        </div>
    </div>
    <div class="notif-container" id="notifContainer"></div>

    <script src="./js/tool.js"></script>
    <script src="./js/net.js"></script>
    <script src="./js/WbyW.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
