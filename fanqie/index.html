<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBook 管理工具</title>
    <style>
        /* WinUI 3 风格 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif; background: #f2f2f2; color: #1a1a1a; height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .app-container { max-width: 820px; width: 100%; height: 90vh; max-height: 900px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .app-header { padding: 20px 24px 12px 24px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .app-title { font-size: 20px; font-weight: 600; }
        .token-status { font-size: 12px; color: #888; background: #f0f0f0; padding: 4px 12px; border-radius: 12px; }
        .main-content { flex: 1; overflow: hidden; position: relative; }
        .page { display: none; height: 100%; overflow-y: auto; padding: 20px 24px 30px; }
        .page.active { display: block; }
        .bottom-nav { display: flex; border-top: 1px solid #e0e0e0; background: #fff; flex-shrink: 0; height: 56px; }
        .nav-item { flex: 1; text-align: center; padding: 10px 0; cursor: pointer; font-size: 14px; font-weight: 500; color: #888; border: none; background: transparent; border-bottom: 3px solid transparent; user-select: none; }
        .nav-item:hover { color: #1a1a1a; }
        .nav-item.active { color: #0078d7; border-bottom-color: #0078d7; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box input { flex: 1; padding: 8px 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background: #fafafa; min-width: 120px; }
        .search-box input:focus { outline: none; border-color: #0078d7; background: #fff; box-shadow: 0 0 0 2px rgba(0,120,215,0.2); }
        .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; background: #0078d7; color: #fff; }
        .btn:hover { background: #106ebe; }
        .btn-secondary { background: #e0e0e0; color: #1a1a1a; }
        .btn-secondary:hover { background: #d0d0d0; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .btn-warning { background: #d83b01; color: #fff; }
        .btn-warning:hover { background: #b82d00; }
        .btn-shelf { background: #107c10; color: #fff; padding: 4px 12px; font-size: 12px; border-radius: 4px; border: none; cursor: pointer; }
        .btn-shelf:hover { background: #0d6a0d; }
        .btn-shelf.cancel { background: #a80000; }
        .btn-shelf.cancel:hover { background: #8a0000; }
        .book-item { background: #f8f8f8; border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; border-left: 4px solid #0078d7; cursor: default; display: flex; justify-content: space-between; align-items: center; }
        .book-item:hover { background: #f0f0f0; }
        .book-item .book-info { flex: 1; }
        .book-item .book-title { font-weight: 600; font-size: 16px; }
        .book-item .book-id { font-size: 13px; color: #666; margin-top: 2px; }
        .book-item .book-actions { margin-left: 12px; }
        .chapter-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 14px; border-bottom: 1px solid #eee; }
        .chapter-item .chapter-id { color: #888; font-size: 12px; margin-right: 10px; }
        .config-form { margin-top: 10px; }
        .config-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .config-row .key { width: 120px; font-weight: 500; font-size: 14px; color: #333; flex-shrink: 0; }
        .config-row .value { flex: 1; padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background: #fafafa; }
        .config-row .value:focus { outline: none; border-color: #0078d7; background: #fff; box-shadow: 0 0 0 2px rgba(0,120,215,0.2); }
        .config-actions { display: flex; justify-content: flex-end; margin-top: 20px; gap: 12px; flex-wrap: wrap; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 6px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
        .toast.show { opacity: 1; }
        .page::-webkit-scrollbar { width: 6px; }
        .page::-webkit-scrollbar-track { background: #f0f0f0; }
        .page::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }
        .loading { color: #888; padding: 20px 0; text-align: center; }
        .error-msg { color: #a80000; padding: 10px 0; }
        .success-msg { color: #107c10; padding: 10px 0; }
        .warn-msg { color: #9b6b00; padding: 10px 0; }
        @media (max-width: 480px) {
            .app-container { height: 100vh; max-height: none; border-radius: 0; }
            .app-header { padding: 16px; }
            .page { padding: 16px; }
            .config-row .key { width: 80px; font-size: 13px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="app-header">
        <span class="app-title">OpenBook 管理</span>
        <span class="token-status" id="tokenStatus">Token 未设置</span>
    </header>
    <div class="main-content">
        <div id="pageSearch" class="page active">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="书籍关键词" style="flex:2;" />
                <input type="text" id="fanqieApiKeyInput" placeholder="番茄 API Key (可选)" style="flex:1;" />
                <button class="btn" id="searchBtn">搜索</button>
            </div>
            <div id="searchResults"></div>
            <div id="bookDetail" style="margin-top: 20px;"></div>
        </div>
        <div id="pageConfig" class="page">
            <div class="config-actions" style="margin-bottom: 12px;">
                <button class="btn btn-secondary btn-sm" id="refreshConfigBtn">刷新配置</button>
                <button class="btn btn-warning btn-sm" id="resetConfigBtn">重置为默认配置 (v1)</button>
                <span style="flex:1;"></span>
                <button class="btn" id="submitConfigBtn">提交</button>
            </div>
            <div id="configForm" class="config-form"></div>
            <div id="configStatus" style="margin-top: 12px;"></div>
        </div>
    </div>
    <div class="bottom-nav">
        <button class="nav-item active" data-page="pageSearch">搜索</button>
        <button class="nav-item" data-page="pageConfig">配置</button>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
(function() {
    'use strict';

    // ---------- 请在此填写 Gitee Token (仓库写入权限) ----------
    const GITEE_TOKEN = '36079a70cc1fbac56f6846d99653405a';  // 例如: 'ghp_xxxx'

    // ---------- CORS 代理配置 ----------
    const CORS_PROXY = 'https://cors.344977.xyz/api?url=';

    // ---------- 固定配置 ----------
    const OWNER = 'yingo-server';
    const REPO = 'openbook';
    const CONFIG_PATH = 'users/private/0/config.ob';
    const CONFIG_API_URL = `https://gitee.com/api/v5/repos/${OWNER}/${REPO}/contents/${CONFIG_PATH}`;

    // DOM 元素
    const pageSearch = document.getElementById('pageSearch');
    const pageConfig = document.getElementById('pageConfig');
    const navBtns = document.querySelectorAll('.nav-item');
    const searchInput = document.getElementById('searchInput');
    const fanqieApiKeyInput = document.getElementById('fanqieApiKeyInput');
    const searchBtn = document.getElementById('searchBtn');
    const searchResults = document.getElementById('searchResults');
    const bookDetail = document.getElementById('bookDetail');
    const configForm = document.getElementById('configForm');
    const refreshConfigBtn = document.getElementById('refreshConfigBtn');
    const resetConfigBtn = document.getElementById('resetConfigBtn');
    const submitConfigBtn = document.getElementById('submitConfigBtn');
    const configStatus = document.getElementById('configStatus');
    const tokenStatus = document.getElementById('tokenStatus');

    // ---------- 全局数据 ----------
    let currentConfig = {
        Ver: '1',
        UserName: '',
        UserPasswd: '',
        UserApiKey: '',
        BookList: '',
        BookId: ''
    };
    let shelfBooks = []; // 存储已加入的书籍对象 { id, name }
    let currentSha = '';

    // Toast
    let toastTimer = null;
    function showToast(msg, duration = 3000) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
            toast.classList.remove('show');
        }, duration);
    }

    // 复制功能 (备用，但已不使用，保留以防万一)
    function copyText(text, successMsg = '已复制') {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(successMsg);
            }).catch(() => fallbackCopy(text, successMsg));
        } else {
            fallbackCopy(text, successMsg);
        }
    }
    function fallbackCopy(text, successMsg) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            if (document.execCommand('copy')) {
                showToast(successMsg);
            } else {
                prompt('请手动复制:', text);
                showToast('请手动复制');
            }
        } catch (e) {
            prompt('请手动复制:', text);
            showToast('请手动复制');
        }
        document.body.removeChild(textarea);
    }

    // ---------- 带 CORS 代理的 fetch ----------
    function fetchViaProxy(url, options = {}) {
        const proxyUrl = CORS_PROXY + encodeURIComponent(url);
        return fetch(proxyUrl, options);
    }

    // ---------- Gitee API 操作 ----------
    async function giteeGetFile() {
        const url = `${CONFIG_API_URL}?access_token=${GITEE_TOKEN}`;
        const resp = await fetch(url);
        if (!resp.ok) {
            let errMsg = `HTTP ${resp.status}`;
            try {
                const err = await resp.json();
                errMsg = err.message || errMsg;
            } catch (e) {}
            throw new Error(errMsg);
        }
        const data = await resp.json();
        const binary = atob(data.content);
        let decoded;
        try {
            decoded = decodeURIComponent(escape(binary));
        } catch (e) {
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            decoded = new TextDecoder('utf-8').decode(bytes);
        }
        return {
            raw: decoded,
            sha: data.sha,
        };
    }

    async function giteeUpdateFile(content, sha) {
        const encoded = btoa(unescape(encodeURIComponent(content)));
        const payload = {
            access_token: GITEE_TOKEN,
            content: encoded,
            sha: sha,
            message: '更新 config.ob',
            branch: 'master'
        };
        const resp = await fetch(CONFIG_API_URL, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!resp.ok) {
            let errMsg = `HTTP ${resp.status}`;
            try {
                const err = await resp.json();
                errMsg = err.message || errMsg;
            } catch (e) {}
            throw new Error(errMsg);
        }
        return resp.json();
    }

    // ---------- 配置解析与渲染 ----------
    function parseConfig(raw) {
        const lines = raw.split('\n');
        const config = {};
        for (let line of lines) {
            line = line.trim();
            if (!line || line === '!!!!!') break;
            const atIdx = line.indexOf('@');
            if (atIdx > 0) {
                const key = line.substring(0, atIdx).trim();
                let value = line.substring(atIdx + 1).trim();
                if (value.endsWith('!')) value = value.slice(0, -1);
                config[key] = value;
            }
        }
        return config;
    }

    function buildConfigText(configObj) {
        const lines = [];
        for (const [key, value] of Object.entries(configObj)) {
            if (value !== undefined && value !== null && value !== '') {
                lines.push(`${key}@${value}!`);
            }
        }
        lines.push('!!!!!');
        return lines.join('\n') + '\n';
    }

    function renderConfigForm(config) {
        const keys = ['Ver', 'UserName', 'UserPasswd', 'UserApiKey', 'BookList', 'BookId'];
        let html = '';
        for (const key of keys) {
            const val = (config[key] !== undefined) ? config[key] : '';
            html += `
                <div class="config-row">
                    <span class="key">${key}</span>
                    <input class="value" type="text" data-key="${key}" value="${escapeHtml(val)}" placeholder="请输入 ${key}" />
                </div>
            `;
        }
        configForm.innerHTML = html;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ---------- 生成默认配置 (v1) ----------
    function getDefaultConfig() {
        return {
            Ver: '1',
            UserName: 'admin',
            UserPasswd: '',
            UserApiKey: 'your_api_key_here',
            BookList: '诡秘之主,吞噬星空,斗破苍穹',
            BookId: '7276384138653862966,6982529841564224526,7338034838672247833'
        };
    }

    // ---------- 同步书架与配置 ----------
    function syncShelfFromConfig(config) {
        const bookList = config.BookList ? config.BookList.split(',').map(s => s.trim()).filter(s => s) : [];
        const bookIdList = config.BookId ? config.BookId.split(',').map(s => s.trim()).filter(s => s) : [];
        const len = Math.min(bookList.length, bookIdList.length);
        shelfBooks = [];
        for (let i = 0; i < len; i++) {
            shelfBooks.push({ id: bookIdList[i], name: bookList[i] });
        }
        // 更新 currentConfig 中的 BookList 和 BookId 为字符串
        currentConfig.BookList = shelfBooks.map(b => b.name).join(',');
        currentConfig.BookId = shelfBooks.map(b => b.id).join(',');
    }

    function updateConfigFromShelf() {
        currentConfig.BookList = shelfBooks.map(b => b.name).join(',');
        currentConfig.BookId = shelfBooks.map(b => b.id).join(',');
        // 更新配置表单中的对应字段（如果配置页面正在显示）
        const bookListInput = document.querySelector('.config-row .value[data-key="BookList"]');
        const bookIdInput = document.querySelector('.config-row .value[data-key="BookId"]');
        if (bookListInput) bookListInput.value = currentConfig.BookList;
        if (bookIdInput) bookIdInput.value = currentConfig.BookId;
    }

    // ---------- 加载配置 ----------
    async function loadConfig() {
        if (!GITEE_TOKEN) {
            configStatus.innerHTML = '<span class="error-msg">请先设置 GITEE_TOKEN</span>';
            return;
        }
        configStatus.innerHTML = '<div class="loading">加载配置中...</div>';
        try {
            const { raw, sha } = await giteeGetFile();
            const config = parseConfig(raw);
            currentSha = sha;
            // 更新 currentConfig
            for (const key of Object.keys(config)) {
                currentConfig[key] = config[key];
            }
            // 同步书架
            syncShelfFromConfig(currentConfig);
            // 渲染表单
            renderConfigForm(currentConfig);
            // 版本检查
            const ver = parseInt(currentConfig.Ver, 10);
            if (isNaN(ver) || ver < 1) {
                configStatus.innerHTML = `<span class="warn-msg">当前配置版本为 ${currentConfig.Ver || '未定义'}，已自动填充默认配置 (v1)。请修改后提交。</span>`;
                const defaultConfig = getDefaultConfig();
                for (const key of Object.keys(defaultConfig)) {
                    if (!currentConfig[key] || currentConfig[key].trim() === '') {
                        currentConfig[key] = defaultConfig[key];
                    }
                }
                currentConfig.Ver = '1';
                syncShelfFromConfig(currentConfig);
                renderConfigForm(currentConfig);
                showToast('配置版本过旧，请修改后提交', 5000);
            } else {
                configStatus.innerHTML = '<span class="success-msg">配置加载成功</span>';
            }
            // 自动填充番茄 API Key
            const userApiKey = currentConfig.UserApiKey || '';
            if (userApiKey) {
                fanqieApiKeyInput.value = userApiKey.split(',')[0] || '';
            }
            // 刷新搜索结果的按钮状态
            refreshSearchButtons();
        } catch (err) {
            configStatus.innerHTML = `<span class="error-msg">加载失败: ${err.message}</span>`;
            showToast('加载配置失败: ' + err.message, 5000);
        }
    }

    // ---------- 重置为默认配置 ----------
    function resetToDefault() {
        const defaultConfig = getDefaultConfig();
        currentConfig = defaultConfig;
        syncShelfFromConfig(currentConfig);
        renderConfigForm(currentConfig);
        currentSha = '';
        configStatus.innerHTML = '<span class="warn-msg">已填充默认配置 (v1)，请修改后提交。</span>';
        showToast('已重置为默认配置', 3000);
        refreshSearchButtons();
    }

    // ---------- 提交配置 ----------
    async function submitConfig() {
        if (!GITEE_TOKEN) {
            showToast('请先设置 GITEE_TOKEN', 4000);
            return;
        }
        // 从表单读取最新值
        const inputs = configForm.querySelectorAll('.value');
        const config = {};
        inputs.forEach(input => {
            const key = input.dataset.key;
            config[key] = input.value.trim();
        });
        // 确保 Ver 为 1
        config.Ver = '1';
        // 同步到 currentConfig 和 shelfBooks
        for (const key of Object.keys(config)) {
            currentConfig[key] = config[key];
        }
        syncShelfFromConfig(currentConfig);

        const newContent = buildConfigText(currentConfig);
        let sha = currentSha;
        if (!sha) {
            try {
                const fileInfo = await giteeGetFile();
                sha = fileInfo.sha;
            } catch (err) {
                showToast('无法获取文件 SHA: ' + err.message, 4000);
                return;
            }
        }
        configStatus.innerHTML = '<div class="loading">提交中...</div>';
        try {
            await giteeUpdateFile(newContent, sha);
            configStatus.innerHTML = '<span class="success-msg">提交成功！</span>';
            showToast('配置已提交到 Gitee');
            // 重新加载以更新 SHA
            await loadConfig();
        } catch (err) {
            configStatus.innerHTML = `<span class="error-msg">提交失败: ${err.message}</span>`;
            showToast('提交失败: ' + err.message, 5000);
        }
    }

    // ---------- 搜索书籍 (通过 CORS 代理) ----------
    function searchBooks(keyword, apiKey) {
        if (!keyword.trim()) {
            showToast('请输入关键词');
            return;
        }
        searchResults.innerHTML = '<div class="loading">搜索中...</div>';
        bookDetail.innerHTML = '';

        let fanqieUrl = `http://v3.rain.ink/fanqie/?type=1&keywords=${encodeURIComponent(keyword)}&page=0`;
        if (apiKey) {
            fanqieUrl += `&apikey=${apiKey}`;
        }

        fetchViaProxy(fanqieUrl, {
            headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36' }
        })
        .then(res => {
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        })
        .then(data => {
            if (data.code !== 0 && data.code !== '0') {
                throw new Error(data.message || '搜索失败');
            }
            const tabs = data.search_tabs || [];
            const books = [];
            for (const tab of tabs) {
                if (tab.tab_type === 3) {
                    const items = tab.data || [];
                    for (const item of items) {
                        const bookData = (item.book_data || [])[0];
                        if (bookData) {
                            books.push({
                                id: bookData.book_id,
                                name: bookData.book_name,
                                author: bookData.author || '',
                            });
                        }
                    }
                }
            }
            if (books.length === 0) {
                searchResults.innerHTML = '<div class="error-msg">未找到书籍</div>';
                return;
            }
            // 渲染搜索结果
            let html = '';
            for (const book of books) {
                const isOnShelf = shelfBooks.some(b => b.id === book.id);
                const btnText = isOnShelf ? '取消' : '加入书架';
                const btnClass = isOnShelf ? 'btn-shelf cancel' : 'btn-shelf';
                html += `
                    <div class="book-item" data-id="${book.id}" data-name="${book.name}">
                        <div class="book-info">
                            <div class="book-title">${escapeHtml(book.name)}</div>
                            <div class="book-id">ID: ${escapeHtml(book.id)}</div>
                        </div>
                        <div class="book-actions">
                            <button class="${btnClass}" data-action="shelf">${btnText}</button>
                        </div>
                    </div>
                `;
            }
            searchResults.innerHTML = html;

            // 绑定按钮事件
            searchResults.querySelectorAll('.book-item .btn-shelf').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const item = this.closest('.book-item');
                    const id = item.dataset.id;
                    const name = item.dataset.name;
                    if (this.textContent === '加入书架') {
                        // 加入
                        if (!shelfBooks.some(b => b.id === id)) {
                            shelfBooks.push({ id, name });
                            updateConfigFromShelf();
                            this.textContent = '取消';
                            this.classList.add('cancel');
                            showToast(`已加入：${name}`, 2000);
                        }
                    } else {
                        // 取消
                        const idx = shelfBooks.findIndex(b => b.id === id);
                        if (idx !== -1) {
                            shelfBooks.splice(idx, 1);
                            updateConfigFromShelf();
                            this.textContent = '加入书架';
                            this.classList.remove('cancel');
                            showToast(`已移除：${name}`, 2000);
                        }
                    }
                    // 更新其他搜索结果的按钮状态（因为可能有重复书籍）
                    refreshSearchButtons();
                });
            });
        })
        .catch(err => {
            searchResults.innerHTML = `<div class="error-msg">搜索失败: ${err.message}</div>`;
            showToast('搜索失败: ' + err.message, 4000);
        });
    }

    // ---------- 刷新搜索按钮状态 ----------
    function refreshSearchButtons() {
        document.querySelectorAll('.book-item').forEach(item => {
            const id = item.dataset.id;
            const btn = item.querySelector('.btn-shelf');
            if (!btn) return;
            const isOnShelf = shelfBooks.some(b => b.id === id);
            if (isOnShelf) {
                btn.textContent = '取消';
                btn.classList.add('cancel');
            } else {
                btn.textContent = '加入书架';
                btn.classList.remove('cancel');
            }
        });
    }

    // ---------- 获取目录 (通过 CORS 代理) ----------
    function fetchCatalog(bookId, bookName, apiKey) {
        bookDetail.innerHTML = '<div class="loading">加载目录...</div>';
        let fanqieUrl = `http://v3.rain.ink/fanqie/?type=3&bookid=${bookId}`;
        if (apiKey) {
            fanqieUrl += `&apikey=${apiKey}`;
        }

        fetchViaProxy(fanqieUrl, {
            headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36' }
        })
        .then(res => {
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        })
        .then(data => {
            if (data.code !== 0) {
                throw new Error(data.message || '获取目录失败');
            }
            const list = data.data?.item_data_list || [];
            if (list.length === 0) {
                bookDetail.innerHTML = '<div class="error-msg">该书籍暂无目录</div>';
                return;
            }
            let html = `<div style="font-weight:600;margin-bottom:10px;">${escapeHtml(bookName)} 的目录 (共${list.length}章)</div>`;
            html += `<div style="max-height:300px;overflow-y:auto;">`;
            for (let i = 0; i < list.length; i++) {
                const item = list[i];
                html += `
                    <div class="chapter-item">
                        <span><span class="chapter-id">${i+1}.</span> ${escapeHtml(item.title)}</span>
                        <span style="color:#888;font-size:12px;">ID: ${item.item_id}</span>
                    </div>
                `;
            }
            html += `</div>`;
            bookDetail.innerHTML = html;
        })
        .catch(err => {
            bookDetail.innerHTML = `<div class="error-msg">获取目录失败: ${err.message}</div>`;
            showToast('获取目录失败: ' + err.message, 4000);
        });
    }

    // ---------- 导航切换 ----------
    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(el => el.classList.toggle('active', el.id === pageId));
        navBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.page === pageId));
        // 切换到配置页时，刷新表单确保数据最新
        if (pageId === 'pageConfig') {
            renderConfigForm(currentConfig);
        }
    }
    navBtns.forEach(btn => btn.addEventListener('click', function() { switchPage(this.dataset.page); }));

    // ---------- 事件绑定 ----------
    searchBtn.addEventListener('click', function() {
        const keyword = searchInput.value.trim();
        const apiKey = fanqieApiKeyInput.value.trim();
        searchBooks(keyword, apiKey);
    });
    searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') searchBtn.click(); });
    fanqieApiKeyInput.addEventListener('keypress', e => { if (e.key === 'Enter') searchBtn.click(); });

    refreshConfigBtn.addEventListener('click', loadConfig);
    resetConfigBtn.addEventListener('click', resetToDefault);
    submitConfigBtn.addEventListener('click', submitConfig);

    // ---------- 初始化 ----------
    if (GITEE_TOKEN) {
        tokenStatus.textContent = 'Token 已设置';
        tokenStatus.style.color = '#107c10';
    } else {
        tokenStatus.textContent = '⚠️ Token 未设置';
        tokenStatus.style.color = '#a80000';
    }

    loadConfig();

    // 暴露调试
    window.__debug = { currentConfig, shelfBooks, loadConfig, searchBooks, resetToDefault };
})();
</script>
</body>
</html>
