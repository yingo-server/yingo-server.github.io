<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>谢谢心意 · 由衷致谢</title>
    <style>
        /* ---------- 全局重置，零装饰 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Helvetica, "Noto Sans", system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 1rem;
        }

        /* 核心容器：纵向居中，无任何装饰性伪元素 */
        .core {
            text-align: center;
            width: auto;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 公用英文样式：衬线字体，日夜间色彩过渡 */
        .en-desktop, .en-mobile {
            font-family: Georgia, "Times New Roman", Times, serif;
            font-weight: 500;
            letter-spacing: 0.01em;
            transition: color 0.3s ease;
            line-height: 1.3;
        }

        /* 电脑端 (默认) : 英文不换行，单行显示 */
        .en-desktop {
            white-space: nowrap;
            display: block;
        }

        /* 手机端英文默认为隐藏，仅当媒体查询生效时显示 */
        .en-mobile {
            display: none;
        }

        /* 中文样式：权威无衬线，大小始终为英文的 80% (通过 clamp 比例精确控制) */
        .zh-line {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Helvetica, "Noto Sans", system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
            font-weight: 600;
            letter-spacing: 0.02em;
            white-space: nowrap;
            transition: color 0.3s ease;
            margin-top: 0.75rem;
        }

        /* ---------- 统一字体大小策略：英文基准使用 clamp，中文按 80% 比例计算 ---------- */
        /* 电脑端 & 手机端 英文统一字体 (桌面单行/手机多行字号相同) */
        .en-desktop, .en-mobile {
            font-size: clamp(32px, 7vw, 96px);
        }
        /* 中文大小 = 英文大小 * 0.8，精确匹配 clamp(25.6px, 5.6vw, 76.8px) */
        .zh-line {
            font-size: clamp(25.6px, 5.6vw, 76.8px);
        }

        /* 手机端 (竖屏或宽度 ≤ 768px) 显示多行英文，隐藏单行版本 */
        @media (max-width: 768px) {
            .en-desktop {
                display: none;
            }
            .en-mobile {
                display: block;
                white-space: normal;
                word-break: keep-all;
                line-height: 1.4;
            }
            /* 手机端中文内边距微调，保持美观 */
            .zh-line {
                margin-top: 0.9rem;
            }
        }

        /* 确保超宽桌面下字体不过大 */
        @media (min-width: 1600px) {
            .en-desktop, .en-mobile {
                font-size: 96px;
            }
            .zh-line {
                font-size: 76.8px;
            }
        }

        /* 针对极窄手机 (最小320px) 保证比例舒适 */
        @media (max-width: 480px) {
            .en-desktop, .en-mobile {
                font-size: clamp(28px, 6.8vw, 60px);
            }
            .zh-line {
                font-size: clamp(22.4px, 5.44vw, 48px);
            }
        }

        /* ---------- 日间模式 (light) ---------- */
        body.light-mode {
            background-color: #ffffff;
        }
        body.light-mode .en-desktop,
        body.light-mode .en-mobile {
            color: #1e1e1e;
        }
        body.light-mode .zh-line {
            color: #2c2c2c;
        }

        /* ---------- 夜间模式 (dark) ---------- */
        body.dark-mode {
            background-color: #000000;
        }
        body.dark-mode .en-desktop,
        body.dark-mode .en-mobile {
            color: #f5f5f7;
        }
        body.dark-mode .zh-line {
            color: #e0e0e0;
        }

        /* 移除任何焦点装饰及多余边距 */
        :focus-visible {
            outline: none;
        }
        body::before, body::after, .core::before, .core::after {
            display: none;
        }
    </style>
</head>
<body>
    <div class="core">
        <!-- 桌面端方案：英文保持一行不换行 -->
        <div class="en-desktop">Thank You for Your Heartfelt Kindness</div>
        
        <!-- 手机端方案：英文巧妙换行，至少三行，并将 "for" 单独成行（优雅且符合短词单独一行要求） -->
        <div class="en-mobile">
            Thank You<br>for<br>Your Heartfelt Kindness
        </div>
        
        <!-- 中文：谢谢心意，永远位于英文下方 -->
        <div class="zh-line">谢谢心意</div>
    </div>

    <script>
        (function() {
            // 自动根据本地时间切换日间/夜间模式（无任何装饰逻辑，纯粹基于小时）
            const LIGHT_START_HOUR = 6;   // 早上6点
            const LIGHT_END_HOUR = 18;    // 下午18点（不含18点整进入夜间）

            function getCurrentHour() {
                return new Date().getHours();
            }

            function getThemeFromHour(hour) {
                if (hour >= LIGHT_START_HOUR && hour < LIGHT_END_HOUR) {
                    return 'light';
                } else {
                    return 'dark';
                }
            }

            function applyTheme(theme) {
                const body = document.body;
                if (theme === 'light') {
                    body.classList.remove('dark-mode');
                    body.classList.add('light-mode');
                } else {
                    body.classList.remove('light-mode');
                    body.classList.add('dark-mode');
                }
            }

            function updateTheme() {
                const hour = getCurrentHour();
                const targetTheme = getThemeFromHour(hour);
                applyTheme(targetTheme);
            }

            // 立即执行一次，保证初始主题正确
            updateTheme();

            // 每分钟检查一次，确保跨小时边界自动切换
            setInterval(updateTheme, 60 * 1000);

            // 页面可见性变化时重新校对
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) updateTheme();
            });

            // 窗口获得焦点时校对
            window.addEventListener('focus', updateTheme);
        })();
    </script>
</body>
</html>
