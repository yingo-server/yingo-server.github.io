import java.io.File;
import java.io.FileOutputStream;
import java.io.OutputStreamWriter;
import java.text.SimpleDateFormat;
import java.util.Date;
import java.util.Locale;

public class Logger {
    private File logDir;
    private File currentLogFile;

    public Logger(File baseDir) {
        String time = new SimpleDateFormat("yyyy-MM-dd-HH-mm-ss", Locale.getDefault()).format(new Date());
        logDir = new File(baseDir, "logs/" + time);
        logDir.mkdirs();
        currentLogFile = new File(logDir, "logs.ob");
    }

    public void log(String level, String message) {
        String timestamp = new SimpleDateFormat("yyyy-MM-dd-HH:mm:ss", Locale.getDefault()).format(new Date());
        String line = "[" + timestamp + "][" + level + "]:" + message + "\\n";
        try {
            FileOutputStream fos = new FileOutputStream(currentLogFile, true);
            OutputStreamWriter osw = new OutputStreamWriter(fos, "UTF-8");
            osw.write(line);
            osw.close();
        } catch (Exception e) {
            e.printStackTrace();
        }
        android.util.Log.d("OpenBook", line.trim());
    }
}`;

import java.io.BufferedReader;
import java.io.File;
import java.io.FileInputStream;
import java.io.FileOutputStream;
import java.io.InputStreamReader;
import java.io.OutputStreamWriter;
import java.util.ArrayList;
import java.util.HashMap;
import java.util.List;
import java.util.Map;

public class ConfigManager {
    private static final String CONFIG_URL = "https://gitee.com/yingo-server/openbook/users/private/0/config.ob";
    private static final String CACHE_FILE = "config.ob";
    private File baseDir;
    private ApiClient apiClient;

    public static class Config {
        public int ver = 0;
        public String userName = "";
        public String userPasswd = "";
        public List<String> apiKeys = new ArrayList<>();
        public List<BookInfo> bookList = new ArrayList<>();
    }

    public ConfigManager(File baseDir) {
        this.baseDir = baseDir;
        this.apiClient = new ApiClient(null);
    }

    public Config fetchAndParse() {
        String raw = apiClient.fetchConfig(CONFIG_URL);
        if (raw != null && raw.contains("!!!!!")) {
            saveCache(raw);
            return parse(raw);
        } else {
            String cached = loadCache();
            if (cached != null && cached.contains("!!!!!")) {
                return parse(cached);
            }
            return null;
        }
    }

    private void saveCache(String raw) {
        try {
            File cacheFile = new File(baseDir, CACHE_FILE);
            cacheFile.getParentFile().mkdirs();
            FileOutputStream fos = new FileOutputStream(cacheFile);
            OutputStreamWriter osw = new OutputStreamWriter(fos, "UTF-8");
            osw.write(raw);
            osw.close();
        } catch (Exception e) {
            e.printStackTrace();
        }
    }

    private String loadCache() {
        File cacheFile = new File(baseDir, CACHE_FILE);
        if (!cacheFile.exists()) return null;
        try {
            FileInputStream fis = new FileInputStream(cacheFile);
            BufferedReader br = new BufferedReader(new InputStreamReader(fis, "UTF-8"));
            StringBuilder sb = new StringBuilder();
            String line;
            while ((line = br.readLine()) != null) {
                sb.append(line).append("\\n");
            }
            br.close();
            return sb.toString();
        } catch (Exception e) {
            e.printStackTrace();
            return null;
        }
    }

    private Config parse(String raw) {
        Config config = new Config();
        Map<String, String> kv = new HashMap<>();
        String[] lines = raw.split("\\n");
        for (String line : lines) {
            line = line.trim();
            if (line.isEmpty() || line.equals("!!!!!")) break;
            int at = line.indexOf('@');
            if (at <= 0) continue;
            String key = line.substring(0, at).trim();
            String value = line.substring(at + 1).trim();
            if (value.endsWith("!")) {
                value = value.substring(0, value.length() - 1);
            }
            kv.put(key, value);
        }

        if (kv.containsKey("Ver")) {
            try { config.ver = Integer.parseInt(kv.get("Ver")); } catch (Exception ignored) {}
        }
        config.userName = kv.get("UserName") != null ? kv.get("UserName") : "";
        config.userPasswd = kv.get("UserPasswd") != null ? kv.get("UserPasswd") : "";
        if (kv.containsKey("UserApiKey")) {
            String[] keys = kv.get("UserApiKey").split(",");
            for (String k : keys) {
                String trimmed = k.trim();
                if (!trimmed.isEmpty()) config.apiKeys.add(trimmed);
            }
        }
        String bookListStr = kv.get("BookList");
        String bookIdStr = kv.get("BookId");
        if (bookListStr != null && bookIdStr != null) {
            String[] names = bookListStr.split(",");
            String[] ids = bookIdStr.split(",");
            int len = Math.min(names.length, ids.length);
            for (int i = 0; i < len; i++) {
                String name = names[i].trim();
                String id = ids[i].trim();
                if (!name.isEmpty() && !id.isEmpty()) {
                    config.bookList.add(new BookInfo(id, name));
                }
            }
        }
        return config;
    }
}`;

            files[javaBase + 'BookManager.java'] = `package com.openbook.studio;

import java.io.BufferedReader;
import java.io.File;
import java.io.FileInputStream;
import java.io.FileOutputStream;
import java.io.InputStreamReader;
import java.io.OutputStreamWriter;
import java.util.HashMap;
import java.util.Map;

public class BookManager {
    private static final String PROGRESS_FILE = "progress.ob";
    private File progressFile;

    public BookManager(File baseDir) {
        this.progressFile = new File(baseDir, PROGRESS_FILE);
        progressFile.getParentFile().mkdirs();
    }

    public String getProgress(String bookId) {
        Map<String, String> map = loadAllProgress();
        return map.get(bookId);
    }

    public void updateProgress(String bookId, int chapter, int page) {
        Map<String, String> map = loadAllProgress();
        map.put(bookId, chapter + "," + page);
        saveAllProgress(map);
    }

    private Map<String, String> loadAllProgress() {
        Map<String, String> map = new HashMap<>();
        if (!progressFile.exists()) return map;
        try {
            FileInputStream fis = new FileInputStream(progressFile);
            BufferedReader br = new BufferedReader(new InputStreamReader(fis, "UTF-8"));
            String line;
            while ((line = br.readLine()) != null) {
                line = line.trim();
                if (line.isEmpty()) continue;
                int at = line.indexOf('@');
                if (at > 0) {
                    String id = line.substring(0, at);
                    String value = line.substring(at + 1);
                    map.put(id, value);
                }
            }
            br.close();
        } catch (Exception e) {
            e.printStackTrace();
        }
        return map;
    }

    private void saveAllProgress(Map<String, String> map) {
        try {
            FileOutputStream fos = new FileOutputStream(progressFile);
            OutputStreamWriter osw = new OutputStreamWriter(fos, "UTF-8");
            for (Map.Entry<String, String> entry : map.entrySet()) {
                osw.write(entry.getKey() + "@" + entry.getValue() + "\\n");
            }
            osw.close();
        } catch (Exception e) {
            e.printStackTrace();
        }
    }
}`;

            JSONObject data = root.optJSONObject("data");

            JSONArray list = data.optJSONArray("item_data_list");

            JSONObject data = root.optJSONObject("data");
            if (data == null) return null;
            String content = data.optString("content");

            e.printStackTrace();

    private String executeGet(String url) {
        String key = getNextKey();
        if (TextUtils.isEmpty(key)) return null;

                .url(fullUrl)
                .header("User-Agent", USER_AGENT)
                .get()
                .build();

            if (response.isSuccessful()) {
                return response.body().string();

        } catch (IOException e) {
            e.printStackTrace();
        }
        return null;
    }

    private String cleanContent(String content) {
        String warning = "为保证服务质量，免费用户请不要下书！或前往网站赞助后刷新隐藏该提示(赞助用户一天可下载一万章)";
        if (content.contains(warning)) {
            content = content.replace(warning, "").replace("\\n  " + warning, "");
        }
        content = content.replace("</p>", "\\n");
        content = content.replace("<br>", "\\n").replace("<br/>", "\\n");
        content = content.replaceAll("<[^>]*>", "");
        content = content.replaceAll("\\n{3,}", "\\n\\n");
        content = content.trim();
        return content;
    }

        }
        totalPages = computeTotalPages(content);
        if (page >= totalPages) page = totalPages - 1;
        if (page < 0) page = 0;
        currentPage = page;
        currentGrid = renderPage(content, currentPage);

    // ---- 分页计算 ----
    private int computeTotalPages(String content) {
        int rows = 0, cols = 0, pages = 0;
        for (int i = 0; i < content.length(); i++) {
            char ch = content.charAt(i);
            if (ch == '\\n') {
                cols = GRID_COLS;
                rows++;
                cols = 0;
                if (rows >= GRID_ROWS) {
                    pages++;
                    rows = 0;
                    cols = 0;
                }
            } else {
                cols++;
                if (cols >= GRID_COLS) {
                    cols = 0;
                    rows++;
                    if (rows >= GRID_ROWS) {
                        pages++;
                        rows = 0;
                        cols = 0;
                    }
                }
            }
        }
        if (rows > 0 || cols > 0) pages++;
        return pages;
    }

    private char[][] renderPage(String content, int page) {
        char[][] grid = new char[GRID_ROWS][GRID_COLS];
        for (int r = 0; r < GRID_ROWS; r++) {
            for (int c = 0; c < GRID_COLS; c++) {
                grid[r][c] = ' ';
            }
        }
        int target = page;
        int current = 0;
        int row = 0, col = 0;
        for (int i = 0; i < content.length(); i++) {
            char ch = content.charAt(i);
            if (current == target) {
                if (ch == '\\n') {
                    while (col < GRID_COLS) {
                        grid[row][col] = ' ';
                        col++;
                    }
                    row++;
                    col = 0;
                    if (row >= GRID_ROWS) break;
                } else {
                    grid[row][col] = ch;
                    col++;
                    if (col >= GRID_COLS) {
                        col = 0;
                        row++;
                        if (row >= GRID_ROWS) break;
                    }
                }
            } else {
                // 跳过本页
                if (ch == '\\n') {
                    col = GRID_COLS;
                    row++;
                    col = 0;
                    if (row >= GRID_ROWS) {
                        current++;
                        row = 0;
                        col = 0;
                    }
                } else {
                    col++;
                    if (col >= GRID_COLS) {
                        col = 0;
                        row++;
                        if (row >= GRID_ROWS) {
                            current++;
                            row = 0;
                            col = 0;
                        }
                    }
                }
                if (current > target) break;
            }
        }
        return grid;
    }

    // ---- 辅助 ----
    private void onLongPress() {
        finish();
    }

    private void switchToReading() {
        currentState = STATE_READING;
        refreshScreen();
    }

    private void refreshScreen() {
        uiHandler.sendEmptyMessage(0);
    }

    // ---- 初始化 ----
    private void doInitialization() {
        logger.log("INFO", "App启动，开始初始化");
        ConfigManager.Config config = configManager.fetchAndParse();
        if (config == null) {
            logger.log("ERROR", "配置加载失败");
            runOnUiThread(new Runnable() {
                @Override
                public void run() {
                    statusMessage = "配置加载失败";
                    refreshScreen();
                }
            });
            return;
        }
        logger.log("INFO", "配置加载成功，版本:" + config.ver);
        apiClient.setApiKeys(config.apiKeys);
        bookList = config.bookList;
        for (BookInfo book : bookList) {
            if (bookManager.getProgress(book.id) == null) {
                bookManager.updateProgress(book.id, 1, 0);
            }
        }
        runOnUiThread(new Runnable() {
            @Override
            public void run() {
                currentState = STATE_BOOK_LIST;
                statusMessage = "选择书籍";
                refreshScreen();
            }
        });
        logger.log("INFO", "初始化完成");

        run: |

            echo "gradlew not found, generating..."

          echo "ANDROID_HOME: $ANDROID_HOME"

          cat ${{ env.PROJECT_DIR }}/app/build.gradle

            // 现在开始执行逻辑
            async function deploy() {
                const token = document.getElementById('token').value.trim();
                const repoName = document.getElementById('repo').value.trim();
                const org = document.getElementById('org').value.trim();
                if (!token) { log('❌ 请提供有效的 GitHub Token', 'error'); return; }
                if (!repoName) { log('❌ 请输入仓库名称', 'error'); return; }

                setLoading(true);
                log('🚀 开始部署流程...', 'info');

                const headers = {
                    'Authorization': 'token ' + token,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                };

                try {
                    // 1. 检查仓库是否存在
                    const repoUrl = `https://api.github.com/repos/${org}/${repoName}`;
                    let repoExists = false;
                    try {
                        const resp = await fetch(repoUrl, { headers });
                        if (resp.ok) {
                            repoExists = true;
                            log(`✅ 仓库 ${org}/${repoName} 已存在，将更新文件`, 'success');
                        } else if (resp.status === 404) {
                            repoExists = false;
                        } else {
                            log(`⚠️ 检查仓库时出错: ${resp.status}`, 'error');
                        }
                    } catch (e) {
                        log(`⚠️ 无法检查仓库: ${e.message}`, 'error');
                    }

                    // 2. 如果不存在，创建仓库
                    if (!repoExists) {
                        log(`📦 正在创建仓库 ${org}/${repoName} ...`, 'info');
                        const createUrl = `https://api.github.com/orgs/${org}/repos`;
                        const payload = {
                            name: repoName,
                            description: 'OpenBook - Android 4.4 电子书阅读器',
                            private: false,
                            auto_init: false
                        };
                        const resp = await fetch(createUrl, {
                            method: 'POST',
                            headers: headers,
                            body: JSON.stringify(payload)
                        });
                        if (!resp.ok) {
                            const err = await resp.json();
                            throw new Error(`创建仓库失败 (${resp.status}): ${JSON.stringify(err)}`);
                        }
                        log(`✅ 仓库创建成功`, 'success');
                        // 等待几秒让仓库准备就绪
                        await new Promise(r => setTimeout(r, 2000));
                    }

                    // 3. 上传所有文件
                    const baseUrl = `https://api.github.com/repos/${org}/${repoName}/contents`;
                    for (const [path, content] of Object.entries(files)) {
                        log(`📄 正在上传 ${path} ...`, 'info');
                        // 编码内容
                        const encoded = btoa(unescape(encodeURIComponent(content)));
                        const payload = {
                            message: `Add ${path}`,
                            content: encoded,
                            branch: 'main'
                        };
                        // 先检查文件是否存在，若存在则获取sha以更新
                        let sha = null;
                        try {
                            const getResp = await fetch(`${baseUrl}/${path}`, { headers });
                            if (getResp.ok) {
                                const data = await getResp.json();
                                sha = data.sha;
                            }
                        } catch (e) { /* ignore */ }

                        if (sha) {
                            payload.sha = sha;
                            payload.message = `Update ${path}`;
                        }

                        const putResp = await fetch(`${baseUrl}/${path}`, {
                            method: 'PUT',
                            headers: headers,
                            body: JSON.stringify(payload)
                        });
                        if (!putResp.ok) {
                            const err = await putResp.json();
                            throw new Error(`上传 ${path} 失败: ${JSON.stringify(err)}`);
                        }
                        log(`✅ ${path} 上传成功`, 'success');
                    }

                    log('🎉 所有文件已成功部署！', 'success');
                    log(`🔗 仓库地址: https://github.com/${org}/${repoName}`, 'info');
                    log('⏳ 等待 GitHub Actions 自动构建 APK ...', 'info');

                } catch (err) {
                    log(`❌ 部署失败: ${err.message}`, 'error');
                } finally {
                    setLoading(false);
                }
            }

            document.getElementById('runBtn').addEventListener('click', deploy);
        })();
    </script>
