<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>对话管理 · Material You</title>

    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

    <style>
        /* ========== 动态主题（与主站一致） ========== */
        :root {
            --md-sys-hue: 267;
            --md-sys-color-primary: hsl(var(--md-sys-hue), 30%, 40%);
            --md-sys-color-on-primary: hsl(var(--md-sys-hue), 20%, 98%);
            --md-sys-color-primary-container: hsl(var(--md-sys-hue), 35%, 90%);
            --md-sys-color-on-primary-container: hsl(var(--md-sys-hue), 40%, 12%);
            --md-sys-color-surface: hsl(var(--md-sys-hue), 20%, 98%);
            --md-sys-color-on-surface: hsl(var(--md-sys-hue), 20%, 8%);
            --md-sys-color-surface-variant: hsl(var(--md-sys-hue), 15%, 93%);
            --md-sys-color-on-surface-variant: hsl(var(--md-sys-hue), 15%, 30%);
            --md-sys-color-outline: hsl(var(--md-sys-hue), 10%, 70%);
            --md-sys-color-outline-variant: hsl(var(--md-sys-hue), 10%, 85%);
            --md-sys-ripple: hsla(var(--md-sys-hue), 10%, 50%, 0.18);
            --md-sys-elevation-1: 0px 1px 2px hsla(var(--md-sys-hue), 10%, 10%, 0.3), 0px 1px 3px 1px hsla(var(--md-sys-hue), 10%, 10%, 0.15);
            --md-sys-elevation-2: 0px 2px 4px hsla(var(--md-sys-hue), 10%, 10%, 0.25), 0px 2px 8px 1px hsla(var(--md-sys-hue), 10%, 10%, 0.15);
            --spacing-xs: 4px; --spacing-sm: 8px; --spacing-md: 16px; --spacing-lg: 24px; --spacing-xl: 32px;
            --font-family: 'Roboto', 'Noto Sans SC', sans-serif;
            --shape-card: 12px; --shape-button: 20px; --shape-full: 9999px;
            --easing-standard: cubic-bezier(0.4, 0.0, 0.2, 1);
            --duration-short: 200ms; --duration-medium: 300ms;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-family);
            background: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            min-height: 100vh;
            padding: var(--spacing-lg);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        .container { max-width: 800px; margin: 0 auto; }

        h1 {
            display: flex; align-items: center; gap: var(--spacing-sm);
            font-size: 22px; font-weight: 500; margin-bottom: var(--spacing-lg);
        }
        h1 .material-symbols-outlined { font-size: 28px; color: var(--md-sys-color-primary); }

        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: var(--spacing-md);
        }
        .status-text { font-size: 14px; color: var(--md-sys-color-on-surface-variant); }

        .btn {
            padding: 8px 20px; border-radius: var(--shape-button); border: none;
            font-size: 14px; font-weight: 500; cursor: pointer; display: inline-flex;
            align-items: center; gap: var(--spacing-xs); transition: all var(--duration-short);
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            box-shadow: var(--md-sys-elevation-1);
        }
        .btn:active { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }

        .table-wrapper {
            background: var(--md-sys-color-surface-variant);
            border-radius: var(--shape-card); padding: var(--spacing-sm);
            box-shadow: var(--md-sys-elevation-1);
        }

        .chat-row {
            display: flex; align-items: center; gap: var(--spacing-sm);
            padding: var(--spacing-sm) var(--spacing-md);
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
        }
        .chat-row:last-child { border-bottom: none; }

        .order-num {
            width: 40px; font-size: 13px; color: var(--md-sys-color-on-surface-variant);
            flex-shrink: 0;
        }

        .title-input {
            flex: 1; padding: 8px 12px; border-radius: var(--shape-button);
            border: 1px solid var(--md-sys-color-outline);
            background: var(--md-sys-color-surface);
            font-family: var(--font-family); font-size: 14px;
            color: var(--md-sys-color-on-surface);
            transition: border-color var(--duration-short);
        }
        .title-input:focus { border-color: var(--md-sys-color-primary); outline: none; }

        .action-btn {
            width: 40px; height: 40px; border-radius: var(--shape-full);
            border: none; background: transparent; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--md-sys-color-on-surface-variant);
            transition: background var(--duration-short);
        }
        .action-btn:active { background: var(--md-sys-ripple); }
        .action-btn.danger { color: #b3261e; }

        .empty-message {
            text-align: center; padding: var(--spacing-xl);
            color: var(--md-sys-color-on-surface-variant);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        <span class="material-symbols-outlined">settings</span>
        对话索引管理
    </h1>

    <div class="status-bar">
        <span class="status-text" id="statusText">正在加载索引...</span>
        <button class="btn" id="refreshBtn">
            <span class="material-symbols-outlined">refresh</span>
            刷新
        </button>
    </div>

    <div class="table-wrapper" id="tableWrapper">
        <div class="empty-message">暂无对话记录</div>
    </div>
</div>

<!-- 依赖 chat.js 以复用 Gitee API -->
<script src="js/chat.js"></script>
<script>
    (async function() {
        const statusEl = document.getElementById('statusText');
        const tableWrapper = document.getElementById('tableWrapper');

        function setStatus(text, isError = false) {
            statusEl.textContent = text;
            statusEl.style.color = isError ? '#b3261e' : 'var(--md-sys-color-on-surface-variant)';
        }

        // 加载配置
        try {
            await Chat.loadConfig();
        } catch (e) {
            setStatus('加载 config.json 失败，请检查文件', true);
            return;
        }

        let indexData = [];

        // 渲染表格
        function render() {
            if (!indexData.length) {
                tableWrapper.innerHTML = '<div class="empty-message">暂无对话记录</div>';
                return;
            }

            let html = '';
            indexData.forEach((item, idx) => {
                html += `
                <div class="chat-row" data-id="${item.id}">
                    <span class="order-num">#${idx + 1}</span>
                    <input class="title-input" type="text" value="${escapeHtml(item.title)}" data-id="${item.id}">
                    <button class="action-btn save-title-btn" title="保存标题">
                        <span class="material-symbols-outlined">save</span>
                    </button>
                    <button class="action-btn danger delete-btn" title="从索引中移除">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                </div>`;
            });
            tableWrapper.innerHTML = html;

            // 绑定保存标题事件
            document.querySelectorAll('.save-title-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const row = e.target.closest('.chat-row');
                    const id = row.dataset.id;
                    const input = row.querySelector('.title-input');
                    const newTitle = input.value.trim();
                    if (!newTitle) { alert('标题不能为空'); return; }
                    const item = indexData.find(i => i.id === id);
                    if (item) item.title = newTitle;
                    setStatus('正在更新索引...');
                    await saveIndex();
                    setStatus(`已更新标题: ${newTitle}`);
                });
            });

            // 绑定删除事件
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const row = e.target.closest('.chat-row');
                    const id = row.dataset.id;
                    const item = indexData.find(i => i.id === id);
                    if (!confirm(`确定要将“${item.title}”从索引中移除吗？文件不会被删除。`)) return;

                    indexData = indexData.filter(i => i.id !== id);
                    // 重新排序 order
                    indexData.forEach((item, idx) => { item.order = idx + 1; });
                    setStatus('正在更新索引...');
                    await saveIndex();
                    render();
                    setStatus(`已移除: ${item.title}`);
                });
            });
        }

        function escapeHtml(text) {
            return String(text).replace(/[&<>"]/g, c => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'
            })[c]);
        }

        async function saveIndex() {
            // 使用 Chat 模块更新索引
            await Chat.uploadIndex(indexData);
        }

        async function loadIndex() {
            setStatus('正在加载云端索引...');
            try {
                indexData = await Chat.fetchIndex();
                // 确保按 order 排序
                indexData.sort((a, b) => a.order - b.order);
                setStatus(`共 ${indexData.length} 个对话`);
            } catch (e) {
                setStatus('加载索引失败: ' + e.message, true);
                indexData = [];
            }
            render();
        }

        document.getElementById('refreshBtn').addEventListener('click', loadIndex);

        // 启动动态色相动画（与主站一致）
        (function startHueAnimation() {
            const root = document.documentElement;
            let hue = 267;
            const speed = 0.6;
            let last = performance.now();
            function step(now) {
                const delta = Math.min(0.1, (now - last) / 1000);
                last = now;
                hue = (hue + speed * delta) % 360;
                root.style.setProperty('--md-sys-hue', Math.round(hue));
                requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        })();

        // 初始加载
        await loadIndex();
    })();
</script>
</body>
</html>
