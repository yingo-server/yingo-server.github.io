<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Chat · Material You</title>

  <!-- Google Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

  <!-- Markdown 渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- 项目样式 -->
  <link rel="stylesheet" href="css/ui.css">
  <link rel="stylesheet" href="css/data.css">
</head>
<body>

  <!-- 启动加载画面 -->
  <div id="loaderScreen" class="loader-screen">
    <div class="loader-content">
      <h2 class="loader-title">AI Chat</h2>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="loader-logs" id="loaderLogs">
        <div class="log-line">...</div>
        <div class="log-line">...</div>
        <div class="log-line">...</div>
      </div>
    </div>
  </div>

  <!-- 主应用（加载完成前隐藏） -->
  <div id="appContainer" class="app-layout" style="display:none;">
    <!-- 移动端遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo-text">AI Chat</span>
        <button class="icon-btn" id="sidebarCollapseBtn" title="收起侧边栏">
          <span class="material-symbols-outlined">menu_open</span>
        </button>
      </div>

      <div class="sidebar-new-chat">
        <button id="newChatBtn">
          <span class="material-symbols-outlined">add</span>
          新建对话
        </button>
      </div>

      <nav class="sidebar-list" id="sidebarList">
        <div class="sidebar-empty">暂无对话</div>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="avatar">
            <span class="material-symbols-outlined">person</span>
          </div>
          <span class="user-name">本地用户</span>
        </div>
      </div>
    </aside>

    <!-- 主聊天区 -->
    <main class="main-area">
      <header class="topbar">
        <button class="menu-btn" id="menuBtn" title="打开侧边栏">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <span class="chat-title-display" id="chatTitleDisplay">AI Chat</span>
        <div class="actions">
          <button class="icon-btn" id="themeBtn" title="主题切换">
            <span class="material-symbols-outlined">dark_mode</span>
          </button>
          <button class="icon-btn" id="uploadBtn" title="上传到云端">
            <span class="material-symbols-outlined">cloud_upload</span>
          </button>
        </div>
      </header>

      <section class="messages-area" id="messagesArea">
        <div class="empty-state">
          <span class="material-symbols-outlined">forum</span>
          <h2>开始对话</h2>
          <p>在下方输入消息，与 AI 开始交流</p>
        </div>
      </section>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="messageInput" rows="1" placeholder="输入消息... (Enter 发送，Shift+Enter 换行)"></textarea>
          <button class="send-btn" id="sendBtn" title="发送">
            <span class="material-symbols-outlined">arrow_upward</span>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- 项目脚本（普通顺序加载） -->
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
