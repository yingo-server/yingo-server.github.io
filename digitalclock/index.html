<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>数字时钟 | 纯粹时计</title>
    <style>
        /* -------------------- RESET & 全局禁用手势 -------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 禁止所有鼠标/触摸选择、拖动、长按菜单 */
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        /* 彻底禁止页面滚动、手势缩放、平移 */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            background: #000000;
            /* 核心：禁止所有触摸手势（双指缩放、拖拽平移） */
            touch-action: none;
            /* 禁止常规鼠标滚动（无内容滚动） */
            overscroll-behavior: none;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DigitalCustom', 'Segoe UI', 'Helvetica Neue', monospace, system-ui;
            background: #000000;
            color: #ffffff;
            /* 平滑抗锯齿 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 自定义字体：用户将otf文件放在同目录下，修改下面url路径即可 */
        @font-face {
            font-family: 'DigitalCustom';
            src: url('./SanFranciscoDisplay-Ultralight-10.otf') format('opentype');
            /* 用户稍后可根据实际文件名修改，例如 'DigitalClock.otf' 或 'MyFont.otf' */
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* 时钟主容器 – 响应式，不撑满屏幕，留出舒适边距 */
        .clock-container {
            width: 90%;
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            /* 避免溢出 */
            overflow: visible;
            /* 优雅过渡 */
            transition: all 0.2s ease;
        }

        /* 三行通用样式 – 竖屏/横屏保持一致垂直排列 */
        .date-row, .time-row, .week-row {
            width: 100%;
            text-align: center;
            line-height: 1.2;
            letter-spacing: 0.02em;
        }

        /* 日期行 (月份缩写 + 日, 年) */
        .date-row {
            font-family: 'DigitalCustom', 'Segoe UI', 'Helvetica Neue', monospace;
            font-weight: 500;
            margin-bottom: 0.25em;
            /* 字体大小使用 clamp 保证在极小/极大屏幕都优雅 */
            font-size: clamp(1.8rem, 8vw, 4rem);
            text-shadow: 0 0 8px rgba(255,255,255,0.3);
            white-space: nowrap;
        }

        /* 时间行 (时:分:秒) 最大字体突出 */
        .time-row {
            font-family: 'DigitalCustom', 'Courier New', monospace;
            font-weight: 700;
            margin: 0.1em 0;
            font-size: clamp(3.2rem, 14vw, 9rem);
            letter-spacing: 0.04em;
            text-shadow: 0 0 12px rgba(0, 200, 255, 0.5);
            white-space: nowrap;
        }

        /* 星期行 (全称/优雅点缀) */
        .week-row {
            font-family: 'DigitalCustom', 'Segoe UI', 'Helvetica Neue', monospace;
            font-weight: 400;
            font-size: clamp(1.2rem, 5vw, 2.6rem);
            opacity: 0.85;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.2em;
            text-shadow: 0 0 4px rgba(255,255,240,0.4);
            white-space: nowrap;
        }

        /* 针对特别小的移动设备（例如宽度小于360px）优化字体，防止日期换行 */
        @media (max-width: 480px) {
            .clock-container {
                width: 95%;
                padding: 1rem;
            }
            .date-row {
                font-size: clamp(1.4rem, 7vw, 2.5rem);
                white-space: nowrap;
            }
            .time-row {
                font-size: clamp(2.2rem, 12vw, 5.5rem);
            }
            .week-row {
                font-size: clamp(0.9rem, 4.5vw, 1.6rem);
            }
        }

        /* 横屏优化：依然保持三行垂直，但稍微压缩间距，确保内容完整且比例优雅 */
        @media (orientation: landscape) and (max-height: 500px) {
            .clock-container {
                padding: 0.8rem;
                gap: 0.2rem;
            }
            .date-row {
                margin-bottom: 0.1em;
                font-size: clamp(1.2rem, 6vh, 2.6rem);
            }
            .time-row {
                font-size: clamp(2rem, 12vh, 6rem);
                margin: 0.05em 0;
            }
            .week-row {
                font-size: clamp(0.9rem, 4vh, 1.8rem);
                margin-top: 0.1em;
            }
        }

        /* 对较宽横屏但高度足够，依然大气 */
        @media (orientation: landscape) and (min-height: 600px) {
            .clock-container {
                transform: scale(0.96);
            }
        }

        /* 禁用任何可能的点击、手势高亮残余 */
        .clock-container * {
            pointer-events: none;  /* 确保任何文字不可被点击/长按，但是不影响页面显示。完全禁止交互手势 */
        }

        /* 保证背景纯黑无噪点，且没有任何滚动/溢出 */
        body::before, body::after {
            display: none;
        }

        /* 可选微光晕，提升质感但保持克制 */
        @keyframes subtlePulse {
            0% { text-shadow: 0 0 2px rgba(255,255,200,0.2);}
            100% { text-shadow: 0 0 10px rgba(100,200,255,0.6);}
        }
        .time-row {
            animation: subtlePulse 3s infinite alternate;
        }
    </style>
</head>
<body>
<div class="clock-container">
    <div class="date-row" id="dateDisplay">加载中...</div>
    <div class="time-row" id="timeDisplay">--:--:--</div>
    <div class="week-row" id="weekDisplay">———</div>
</div>

<script>
    (function() {
        // ---------- 辅助函数 ----------
        // 补零 (数字转两位字符串)
        function padZero(num) {
            return num < 10 ? '0' + num : '' + num;
        }

        // 月份英文缩写数组 (全小写首字母大写)
        const monthsAbbr = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        // 星期全称 (优雅完整显示)
        const weekdaysFull = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        // 更新时钟: 日期、时间、星期
        function updateClock() {
            const now = new Date();

            // ---- 时间部分 HH:MM:SS ----
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const timeString = `${padZero(hours)}:${padZero(minutes)}:${padZero(seconds)}`;

            // ---- 日期部分: 英文缩写月份 + 日 + 年份 (例如 Jan 21, 2026) ----
            const month = monthsAbbr[now.getMonth()];
            const day = now.getDate();
            const year = now.getFullYear();
            const dateString = `${month} ${day}, ${year}`;

            // ---- 星期部分: 完整英文星期 ----
            const weekday = weekdaysFull[now.getDay()];
            const weekString = weekday;

            // 更新DOM
            const timeElem = document.getElementById('timeDisplay');
            const dateElem = document.getElementById('dateDisplay');
            const weekElem = document.getElementById('weekDisplay');

            if (timeElem) timeElem.textContent = timeString;
            if (dateElem) dateElem.textContent = dateString;
            if (weekElem) weekElem.textContent = weekString;
        }

        // 立即执行一次
        updateClock();

        // 每秒同步更新 (精确到秒)
        let intervalId = setInterval(updateClock, 1000);

        // 可选: 监听页面可见性变化，避免无意义后台高频率 (极简优化)
        function handleVisibilityChange() {
            if (document.hidden) {
                if (intervalId) clearInterval(intervalId);
                intervalId = null;
            } else {
                if (!intervalId) {
                    // 恢复时先立即更新一次，再开启定时器
                    updateClock();
                    intervalId = setInterval(updateClock, 1000);
                }
            }
        }
        document.addEventListener('visibilitychange', handleVisibilityChange);

        // 页面关闭时清理定时器 (非必须但优雅)
        window.addEventListener('beforeunload', function() {
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
        });

        // ---------- 额外安全措施：完全屏蔽触摸/鼠标手势（已通过 CSS + 全局 JS 加固）----------
        // 禁用右键菜单（降低意外干扰，但保留F11全屏等系统功能）
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // 禁止所有 touchmove / touchstart 导致的页面滑动/缩放 (双重确保)
        // 注意：CSS touch-action: none 已足够，但某些浏览器可能有奇怪行为，JS 层额外预防
        function preventTouchGesture(e) {
            // 阻止任何可能引起页面滚动或缩放的触摸行为
            if (e.cancelable) {
                e.preventDefault();
            }
            return false;
        }

        // 禁止所有触摸相关可能产生手势的事件 (针对移动端)
        document.body.addEventListener('touchstart', preventTouchGesture, { passive: false });
        document.body.addEventListener('touchmove', preventTouchGesture, { passive: false });
        document.body.addEventListener('touchend', preventTouchGesture, { passive: false });
        document.body.addEventListener('touchcancel', preventTouchGesture, { passive: false });

        // 禁止鼠标拖拽及滚轮缩放导致的页面移动 (桌面端)
        window.addEventListener('wheel', function(e) {
            // 仍然阻止滚轮滚动页面，因为页面无滚动内容但确保无意外滑动
            if (e.cancelable) {
                e.preventDefault();
            }
        }, { passive: false });

        // 禁止键盘方向键滚动 / 空格滚动 (保留 F11 / 全屏快捷键)
        window.addEventListener('keydown', function(e) {
            // 仅仅阻止会导致页面滚动的按键（上下左右、PageUp/Down、Space），
            // 保留 F11 (key code 122) 以及常规刷新等可保留用户自由，但不影响时钟显示。
            const key = e.key;
            const arrowKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Space', 'PageUp', 'PageDown', 'Home', 'End'];
            if (arrowKeys.includes(key) || key === ' ') {
                e.preventDefault();
            }
            // 不阻止 F11 (全屏) , Ctrl+F 刷新等保留
            if (e.key === 'F11') {
                // 浏览器默认全屏行为保留，不做任何干预
                return;
            }
            // 防止 Ctrl + '+' 或 Ctrl + '-' 缩放 (可选，但不强制,因为属于浏览器缩放手势, 但不影响核心功能)
            if ((e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0'))) {
                e.preventDefault();
            }
        });

        // 确保任何 <a> 或假的点击不会产生跳转 (页面无链接但绝对化)
        document.querySelectorAll('*').forEach(el => {
            el.addEventListener('click', (e) => e.preventDefault());
        });
        // 完全阻止所有选择范围和拖拽图片等
        window.addEventListener('dragstart', (e) => e.preventDefault());
        window.addEventListener('selectstart', (e) => e.preventDefault());

        // 确保横竖屏切换时字体比例不超出边界 (ResizeObserver可选，不做额外复杂处理，但强制重绘一次保证)
        window.addEventListener('resize', () => {
            // 极小的修复: 对于横屏下内容可能因宽高比变化重新调整显示，保证字体大小无溢出
            // 重新触发一次时钟更新(无实际必要，但确保布局不变)
            if (document.getElementById('timeDisplay')) {
                // 强制让时钟微调无闪烁，仅用于美观
                updateClock();
            }
        });
        
        // 控制台打印提醒字体配置
        console.log('✅ 数字时钟已启动 | 字体使用同目录 custom.otf ，若未显示正确字体，请将您的otf字体文件命名为 custom.otf 并放置于同一目录。');
    })();
</script>
</body>
</html>
